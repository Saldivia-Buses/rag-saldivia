# Astro module — astrological calculation tools for the Agent Runtime.
module: astro
name: "Astrología"

tools:
  - id: natal_chart
    service: astro
    endpoint: POST /v1/astro/natal
    protocol: http
    type: read
    requires_confirmation: false
    description: "Calcula la carta natal completa de un contacto. Retorna posiciones planetarias, cúspides, dignidades, combustión, retrogradación, Parte de Fortuna y Espíritu."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
          description: "Nombre del contacto"
      required: [contact_name]

  - id: transit_analysis
    service: astro
    endpoint: POST /v1/astro/transits
    protocol: http
    type: read
    requires_confirmation: false
    description: "Analiza tránsitos de planetas lentos sobre la carta natal para un año dado."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
          description: "Nombre del contacto"
        year:
          type: integer
          description: "Año a analizar"
      required: [contact_name, year]

  - id: solar_arc_directions
    service: astro
    endpoint: POST /v1/astro/solar-arc
    protocol: http
    type: read
    requires_confirmation: false
    description: "Direcciones de Arco Solar activas para un año. Incluye antiscia."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        year:
          type: integer
      required: [contact_name, year]

  - id: primary_directions
    service: astro
    endpoint: POST /v1/astro/directions
    protocol: http
    type: read
    requires_confirmation: false
    description: "Direcciones Primarias Polich-Page mundanas. La técnica más precisa para timing de eventos."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        year:
          type: integer
      required: [contact_name, year]

  - id: secondary_progressions
    service: astro
    endpoint: POST /v1/astro/progressions
    protocol: http
    type: read
    requires_confirmation: false
    description: "Progresiones Secundarias (día por año). Detecta ingresos de signo y casa."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        year:
          type: integer
      required: [contact_name, year]

  - id: solar_lunar_return
    service: astro
    endpoint: POST /v1/astro/returns
    protocol: http
    type: read
    requires_confirmation: false
    description: "Revolución Solar y/o Lunar para un año."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        year:
          type: integer
      required: [contact_name, year]

  - id: profections
    service: astro
    endpoint: POST /v1/astro/profections
    protocol: http
    type: read
    requires_confirmation: false
    description: "Profecciones anuales. Casa activa, cronócrata, tema de casa."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        year:
          type: integer
      required: [contact_name, year]

  - id: firdaria
    service: astro
    endpoint: POST /v1/astro/firdaria
    protocol: http
    type: read
    requires_confirmation: false
    description: "Períodos Firdaria. Señor mayor y sub-período activos."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        year:
          type: integer
      required: [contact_name, year]

  - id: fixed_star_conjunctions
    service: astro
    endpoint: POST /v1/astro/fixed-stars
    protocol: http
    type: read
    requires_confirmation: false
    description: "Conjunciones de estrellas fijas con puntos natales."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
      required: [contact_name]

  - id: intelligence_brief
    service: astro
    endpoint: POST /v1/astro/brief
    protocol: http
    type: read
    requires_confirmation: false
    description: "Brief de inteligencia astrológica completo. Ejecuta TODAS las técnicas, cruza resultados y produce matriz de convergencia. Usar cuando se pide un análisis completo."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        year:
          type: integer
      required: [contact_name, year]

  - id: astro_query
    service: astro
    endpoint: POST /v1/astro/query
    protocol: http
    type: read
    requires_confirmation: false
    description: "Consulta astrológica con narración LLM via SSE. Ejecuta todas las técnicas y genera interpretación narrativa."
    parameters:
      type: object
      properties:
        contact_name:
          type: string
        query:
          type: string
          description: "Pregunta o tema a analizar"
        year:
          type: integer
      required: [contact_name, query]

  # ── Plan 12: New technique tools ──

  - id: eclipses
    service: astro
    endpoint: POST /v1/astro/eclipses
    protocol: http
    type: read
    requires_confirmation: false
    description: "Eclipses del año y su activación sobre puntos natales."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: zodiacal_releasing
    service: astro
    endpoint: POST /v1/astro/zodiacal-releasing
    protocol: http
    type: read
    requires_confirmation: false
    description: "Zodiacal Releasing de Fortuna y Espíritu. Niveles L1-L3, loosing of the bond."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: lunations
    service: astro
    endpoint: POST /v1/astro/lunations
    protocol: http
    type: read
    requires_confirmation: false
    description: "Lunas nuevas y llenas del año, aspectos a puntos natales."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: hellenistic_lots
    service: astro
    endpoint: POST /v1/astro/lots
    protocol: http
    type: read
    requires_confirmation: false
    description: "20 lotes helenísticos (Fortuna, Espíritu, Eros, Victoria, etc.) con posición, casa y señor."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: dignities_almuten
    service: astro
    endpoint: POST /v1/astro/dignities
    protocol: http
    type: read
    requires_confirmation: false
    description: "Dignidades esenciales completas + Almutén Figuris. Domicilio, exaltación, triplicidad, término, faz."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: midpoints_ebertin
    service: astro
    endpoint: POST /v1/astro/midpoints
    protocol: http
    type: read
    requires_confirmation: false
    description: "Puntos medios Ebertin: sort de 45°, puntos medios activados por planetas natales."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: declinations
    service: astro
    endpoint: POST /v1/astro/declinations
    protocol: http
    type: read
    requires_confirmation: false
    description: "Declinaciones: paralelos, contra-paralelos, planetas fuera de límites (OOB)."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: fast_transits
    service: astro
    endpoint: POST /v1/astro/fast-transits
    protocol: http
    type: read
    requires_confirmation: false
    description: "Tránsitos de planetas rápidos (Sol, Mercurio, Venus, Marte) sobre puntos natales."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: natal_wheel_svg
    service: astro
    endpoint: POST /v1/astro/wheel
    protocol: http
    type: read
    requires_confirmation: false
    description: "Rueda natal SVG (800x800). Retorna image/svg+xml."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: synastry
    service: astro
    endpoint: POST /v1/astro/synastry
    protocol: http
    type: read
    requires_confirmation: false
    description: "Sinastría entre dos contactos: aspectos cruzados, score de compatibilidad, overlay de casas."
    parameters:
      type: object
      properties:
        contact_a: { type: string, description: "Nombre del primer contacto" }
        contact_b: { type: string, description: "Nombre del segundo contacto" }
      required: [contact_a, contact_b]

  - id: composite_chart
    service: astro
    endpoint: POST /v1/astro/composite
    protocol: http
    type: read
    requires_confirmation: false
    description: "Carta compuesta (puntos medios) entre dos contactos. Representa la relación como entidad."
    parameters:
      type: object
      properties:
        contact_a: { type: string }
        contact_b: { type: string }
      required: [contact_a, contact_b]

  # ── Session management tools ──

  - id: create_session
    service: astro
    endpoint: POST /v1/astro/sessions
    protocol: http
    type: write
    requires_confirmation: false
    description: "Crear una nueva sesión de consulta astrológica."
    parameters:
      type: object
      properties:
        title: { type: string, description: "Título de la sesión" }

  - id: list_sessions
    service: astro
    endpoint: GET /v1/astro/sessions
    protocol: http
    type: read
    requires_confirmation: false
    description: "Listar sesiones de consulta del usuario."

  # ── Prediction tracking tools ──

  - id: log_prediction
    service: astro
    endpoint: POST /v1/astro/predictions
    protocol: http
    type: write
    requires_confirmation: false
    description: "Registrar una predicción para seguimiento y verificación posterior."
    parameters:
      type: object
      properties:
        contact_id: { type: string }
        category: { type: string, description: "timing, event, financial, relational, health, general" }
        description: { type: string }
        date_from: { type: string, description: "Fecha inicio (ISO)" }
        date_to: { type: string, description: "Fecha fin (ISO)" }
        techniques: { type: array, items: { type: string } }
      required: [contact_id, description, date_from, date_to]

  - id: verify_prediction
    service: astro
    endpoint: PATCH /v1/astro/predictions/{id}/verify
    protocol: http
    type: write
    requires_confirmation: true
    description: "Verificar si una predicción se cumplió (correct, incorrect, partial)."
    parameters:
      type: object
      properties:
        outcome: { type: string, description: "correct, incorrect, partial" }
        notes: { type: string }
      required: [outcome]

  # ── Contact management tools ──

  - id: search_contacts
    service: astro
    endpoint: GET /v1/astro/contacts/search
    protocol: http
    type: read
    requires_confirmation: false
    description: "Buscar contactos por nombre. Retorna matches parciales."
    parameters:
      type: object
      properties:
        q: { type: string, description: "Texto de búsqueda" }
      required: [q]

  - id: create_contact
    service: astro
    endpoint: POST /v1/astro/contacts
    protocol: http
    type: write
    requires_confirmation: true
    description: "Crear un nuevo contacto con datos de nacimiento para cálculos astrológicos."
    parameters:
      type: object
      properties:
        name: { type: string }
        birth_date: { type: string, description: "YYYY-MM-DD" }
        birth_time: { type: string, description: "HH:MM" }
        birth_time_known: { type: boolean }
        city: { type: string }
        nation: { type: string }
        lat: { type: number }
        lon: { type: number }
        kind: { type: string, description: "persona o empresa" }
      required: [name, birth_date, city]

  - id: list_contacts
    service: astro
    endpoint: GET /v1/astro/contacts
    protocol: http
    type: read
    requires_confirmation: false
    description: "Listar todos los contactos del usuario."

  # ── Prediction stats ──

  - id: prediction_stats
    service: astro
    endpoint: GET /v1/astro/predictions/stats
    protocol: http
    type: read
    requires_confirmation: false
    description: "Estadísticas de predicciones: total, correctas, incorrectas, parciales, pendientes."

  - id: list_predictions
    service: astro
    endpoint: GET /v1/astro/predictions
    protocol: http
    type: read
    requires_confirmation: false
    description: "Listar predicciones registradas del usuario."

  # ── Business intelligence tools ──

  - id: business_dashboard
    service: astro
    endpoint: GET /v1/astro/business/dashboard
    protocol: http
    type: read
    requires_confirmation: false
    description: "Dashboard empresarial completo: agenda, cash flow, riesgos, timing, Mercury Rx."
    parameters:
      type: object
      properties:
        company_id: { type: string, description: "Nombre del contacto empresa" }
        year: { type: integer }
        month: { type: integer }
      required: [company_id]

  - id: business_cashflow
    service: astro
    endpoint: GET /v1/astro/business/cashflow
    protocol: http
    type: read
    requires_confirmation: false
    description: "Pronóstico de cash flow mensual basado en tránsitos a casas 2 y 8."
    parameters:
      type: object
      properties:
        company_id: { type: string }
        year: { type: integer }
      required: [company_id]

  - id: business_risk
    service: astro
    endpoint: GET /v1/astro/business/risk
    protocol: http
    type: read
    requires_confirmation: false
    description: "Heatmap de riesgos por categoría (financiero, operativo, legal, personal, reputacional) × mes."
    parameters:
      type: object
      properties:
        company_id: { type: string }
        year: { type: integer }
      required: [company_id]

  - id: business_forecast
    service: astro
    endpoint: GET /v1/astro/business/forecast
    protocol: http
    type: read
    requires_confirmation: false
    description: "Pronóstico trimestral: outlook, eventos clave, acciones recomendadas."
    parameters:
      type: object
      properties:
        company_id: { type: string }
        year: { type: integer }
        month: { type: integer }
      required: [company_id]

  - id: business_mercury_rx
    service: astro
    endpoint: GET /v1/astro/business/mercury-rx
    protocol: http
    type: read
    requires_confirmation: false
    description: "Calendario de Mercurio retrógrado del año con impacto por área de negocio."
    parameters:
      type: object
      properties:
        year: { type: integer }

  - id: business_hiring
    service: astro
    endpoint: GET /v1/astro/business/hiring
    protocol: http
    type: read
    requires_confirmation: false
    description: "Calendario de contratación: días favorables para incorporar personal."
    parameters:
      type: object
      properties:
        company_id: { type: string }
        year: { type: integer }
        month: { type: integer }
      required: [company_id]

  - id: business_team
    service: astro
    endpoint: GET /v1/astro/business/team
    protocol: http
    type: read
    requires_confirmation: false
    description: "Compatibilidad del equipo: sinastría entre empresa y cada miembro."
    parameters:
      type: object
      properties:
        company_id: { type: string }
      required: [company_id]

  # ── All remaining technique tools ──

  - id: tertiary_progressions
    service: astro
    endpoint: POST /v1/astro/tertiary-progressions
    protocol: http
    type: read
    requires_confirmation: false
    description: "Progresiones terciarias (1 día = 1 mes lunar). Detecta ingresos de signo y casa."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: decennials
    service: astro
    endpoint: POST /v1/astro/decennials
    protocol: http
    type: read
    requires_confirmation: false
    description: "Deceniales (Vettius Valens): período mayor y sub-período activos, secuencia completa."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: planetary_cycles
    service: astro
    endpoint: POST /v1/astro/planetary-cycles
    protocol: http
    type: read
    requires_confirmation: false
    description: "Retornos y ciclos planetarios (Saturno, Júpiter, Urano, etc.) activos en el año."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: planetary_returns
    service: astro
    endpoint: POST /v1/astro/planetary-returns
    protocol: http
    type: read
    requires_confirmation: false
    description: "Retornos planetarios exactos (Júpiter, Saturno, Marte) durante el año."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: lilith_vertex
    service: astro
    endpoint: POST /v1/astro/lilith-vertex
    protocol: http
    type: read
    requires_confirmation: false
    description: "Análisis extendido de Lilith y Vertex: posiciones natales + tránsitos lentos."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: time_lords
    service: astro
    endpoint: POST /v1/astro/time-lords
    protocol: http
    type: read
    requires_confirmation: false
    description: "Vista unificada de todos los señores del tiempo: profecciones + firdaria + ZR + deceniales. Planeta dominante y nivel de acuerdo."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: electional_dates
    service: astro
    endpoint: POST /v1/astro/electional
    protocol: http
    type: read
    requires_confirmation: false
    description: "Astrología electiva: mejores fechas del año según Luna, tránsitos favorables, Mercury Rx."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: horary_chart
    service: astro
    endpoint: POST /v1/astro/horary
    protocol: http
    type: read
    requires_confirmation: false
    description: "Carta horaria: análisis de la pregunta del momento. VOC Moon, radicalidad, significadores."
    parameters:
      type: object
      properties:
        lat: { type: number }
        lon: { type: number }
        alt: { type: number }
        utc_offset: { type: integer }
      required: [lat, lon]

  - id: astrocartography
    service: astro
    endpoint: POST /v1/astro/astrocartography
    protocol: http
    type: read
    requires_confirmation: false
    description: "Líneas planetarias MC/IC/ASC/DSC sobre mapa geográfico."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: rectification
    service: astro
    endpoint: POST /v1/astro/rectification
    protocol: http
    type: read
    requires_confirmation: true
    description: "Rectificación de hora de nacimiento. Escanea rango de horas y puntúa contra eventos conocidos."
    parameters:
      type: object
      properties:
        year: { type: integer }
        month: { type: integer }
        day: { type: integer }
        lat: { type: number }
        lon: { type: number }
        search_min: { type: number, description: "Hora mínima (ej: 14.0)" }
        search_max: { type: number, description: "Hora máxima (ej: 18.0)" }
        events: { type: array, description: "Eventos de vida conocidos" }
      required: [year, month, day, lat, lon, search_min, search_max]

  - id: weekly_transits
    service: astro
    endpoint: POST /v1/astro/weekly-transits
    protocol: http
    type: read
    requires_confirmation: false
    description: "Digest de tránsitos de los próximos 7 días: ingresos, estaciones, aspectos."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: activation_score
    service: astro
    endpoint: POST /v1/astro/score
    protocol: http
    type: read
    requires_confirmation: false
    description: "Score de activación 0-100 del año + scores mensuales + veredictos por técnica + contradicciones."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: voc_moon
    service: astro
    endpoint: POST /v1/astro/voc-moon
    protocol: http
    type: read
    requires_confirmation: false
    description: "Períodos de Luna vacía de curso del mes."
    parameters:
      type: object
      properties:
        year: { type: integer }

  - id: comparison_table
    service: astro
    endpoint: POST /v1/astro/tabla
    protocol: http
    type: read
    requires_confirmation: false
    description: "Tabla comparativa multi-año con profecciones, firdaria, SA, tránsitos, eclipses."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
        year: { type: integer }
      required: [contact_name, year]

  - id: vocational_analysis
    service: astro
    endpoint: POST /v1/astro/vocational
    protocol: http
    type: read
    requires_confirmation: false
    description: "Análisis vocacional: MC, regente, planetas en casa 10, sugerencias de carrera."
    parameters:
      type: object
      properties:
        contact_name: { type: string }
      required: [contact_name]

  - id: employee_screening
    service: astro
    endpoint: POST /v1/astro/employee-screening
    protocol: http
    type: read
    requires_confirmation: false
    description: "Evaluación de candidato vs empresa: compatibilidad sinástrica + rol sugerido."
    parameters:
      type: object
      properties:
        contact_a: { type: string, description: "Empresa" }
        contact_b: { type: string, description: "Candidato" }
      required: [contact_a, contact_b]
