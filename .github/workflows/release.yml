name: Release

on:
  release:
    types: [published]

jobs:
  update-changelog:
    name: Move [Unreleased] to release version in CHANGELOG
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Get release date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE="${{ steps.date.outputs.date }}"

          # Reemplaza [Unreleased] con el número de versión y fecha
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n---\n\n## [$VERSION] - $DATE/" CHANGELOG.md

          echo "CHANGELOG actualizado: [Unreleased] → [$VERSION] - $DATE"

      - name: Commit CHANGELOG update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): release ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
