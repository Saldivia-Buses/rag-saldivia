name: Release

# Al pushear un tag semver (v1.0.0), crea la GitHub Release con notas desde CHANGELOG.md
# y adjunta el binario compilado de la CLI.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        working-directory: apps/cli
        run: bun run build

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if (index($0, "## [" ver "]") == 1) { in_section=1; print; next }
            }
            in_section && index($0, "[" ver "]: https://") == 1 { exit }
            in_section { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "::error::No se encontró la sección ## [$VERSION] en CHANGELOG.md"
            exit 1
          fi
          echo "Notas de release para v$VERSION ($(wc -l < release-body.md) líneas)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          draft: false
          generate_release_notes: false
          files: apps/cli/dist/rag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
