name: Daily Health Triage

on:
  schedule:
    - cron: '0 22 * * *'  # 7PM Argentina (UTC-3)
  workflow_dispatch:

# ══════════════════════════════════════════════════════════════════════════
# Daily AI-powered health triage. Fetches system health summary from
# HealthWatch service, runs Sonnet analysis, creates GitHub issues for
# high+ findings, sends executive summary email.
#
# Security decisions applied:
#   DS4 — Uses service account JWT for HealthWatch API access
#   DS5 — HealthWatch queries Docker via socket proxy, never raw socket
#   DS6 — Health data written to file, never interpolated in prompt string
#         AI output written to file, parsed with jq, never shell-interpolated
#   M3  — HealthWatch returns scrubbed output (no raw errors/IPs/creds)
#   M5  — Separate API key (ANTHROPIC_API_KEY_TRIAGE)
# ══════════════════════════════════════════════════════════════════════════

jobs:
  triage:
    runs-on: [self-hosted, workstation-1]
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Get service account token
        id: auth
        run: |
          TOKEN=$(bash deploy/scripts/get-service-token.sh healthwatch)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Fetch health summary to file
        run: |
          # DS6: Write to file — NEVER interpolate health data into prompt
          curl -sf http://localhost:8014/v1/healthwatch/summary \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            > /tmp/health-summary.json

          # Verify we got valid JSON
          if ! jq -e '.overall_status' /tmp/health-summary.json > /dev/null 2>&1; then
            echo "::error::Health summary is not valid JSON"
            exit 1
          fi

          echo "Health summary fetched successfully"
          jq -r '.overall_status' /tmp/health-summary.json

      - name: AI Triage
        id: triage
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1.0.94
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_TRIAGE }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Read the file /tmp/health-summary.json which contains the SDA Framework
            health summary. Analyze it and produce a triage report.

            Output ONLY valid JSON in this exact format (no markdown, no code fences):
            {
              "findings": [
                {
                  "severity": "critical|high|medium|low|info",
                  "service": "service-name",
                  "title": "Short description of the issue",
                  "hypothesis": "What might be causing this",
                  "action": "Recommended next step"
                }
              ],
              "executive_summary": "1-2 sentence overview of system health"
            }

            Rules:
            - Do NOT include raw error messages, stack traces, IP addresses, or credentials
            - severity: critical = service down, high = degraded/high error rate,
              medium = elevated latency, low = minor concern, info = observation
            - If everything is healthy, return empty findings array with positive summary
            - Do NOT output anything except the JSON object

      - name: Create GitHub issues for high+ findings
        if: always() && steps.triage.outcome == 'success'
        env:
          EXEC_FILE: ${{ steps.triage.outputs.execution_file }}
        run: |
          # DS6: Read AI output from file, never interpolate in shell
          if [ ! -f "$EXEC_FILE" ]; then
            echo "::warning::No execution file found — skipping issue creation"
            exit 0
          fi

          # Extract JSON from execution file
          if jq -e '.findings' "$EXEC_FILE" > /dev/null 2>&1; then
            cp "$EXEC_FILE" /tmp/triage-output.json
          elif sed -n '/^```\(json\)\?$/,/^```$/{ /^```/d; p }' "$EXEC_FILE" | jq -e '.findings' > /dev/null 2>&1; then
            sed -n '/^```\(json\)\?$/,/^```$/{ /^```/d; p }' "$EXEC_FILE" > /tmp/triage-output.json
          elif python3 -c "
          import json, re, sys
          text = open(sys.argv[1]).read()
          m = re.search(r'\{.*\}', text, re.DOTALL)
          if m:
              obj = json.loads(m.group())
              json.dump(obj, open('/tmp/triage-output.json','w'))
          else:
              sys.exit(1)
          " "$EXEC_FILE" 2>/dev/null; then
            true
          else
            echo "::warning::Could not parse triage output as JSON"
            exit 0
          fi

          # Create issues for critical and high findings
          jq -c '.findings[] | select(.severity == "critical" or .severity == "high")' \
            /tmp/triage-output.json | \
          while IFS= read -r finding; do
            TITLE=$(echo "$finding" | jq -r '.title')
            SERVICE=$(echo "$finding" | jq -r '.service')
            SEVERITY=$(echo "$finding" | jq -r '.severity')

            # Build body from file — never interpolate AI text in shell
            echo "$finding" | jq -r '"**Severity:** \(.severity)\n**Service:** \(.service)\n**Hypothesis:** \(.hypothesis)\n**Suggested action:** \(.action)\n\n---\n_Auto-generated by daily health triage_"' > /tmp/issue-body.txt

            gh issue create \
              --title "$TITLE" \
              --body-file /tmp/issue-body.txt \
              --label "severity:$SEVERITY" \
              --label "auto-triage" \
              --label "service:$SERVICE" || true
          done

      - name: Send email summary
        if: always() && steps.triage.outcome == 'success'
        env:
          EXEC_FILE: ${{ steps.triage.outputs.execution_file }}
        run: |
          if [ ! -f /tmp/triage-output.json ]; then
            echo "::warning::No triage output — skipping email"
            exit 0
          fi

          # Extract executive summary from parsed JSON
          EXEC_SUMMARY=$(jq -r '.executive_summary // "No summary available"' /tmp/triage-output.json)

          # POST to notification service (added in task 4.6)
          # Failures are non-fatal — email is best-effort
          curl -sf -X POST http://localhost:8005/v1/notifications/send \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            --data-binary @- <<PAYLOAD || echo "::warning::Email send failed (notification service may not have /send endpoint yet)"
          {
            "type": "email",
            "to": "enzo@saldivia.com",
            "subject": "SDA Daily Health Triage",
            "body": $(echo "$EXEC_SUMMARY" | jq -Rs .)
          }
          PAYLOAD
