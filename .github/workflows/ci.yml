name: CI

on:
  pull_request:
    branches: [2.0.x, 2.0.5, main]
  push:
    branches: [2.0.x, 2.0.5, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════════════════
# Gate 1: Verify — lint, vet, build (parallel within gate)
# ══════════════════════════════════════════════════════════════════════════

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: bun-

      - name: Install commitlint
        run: bun install --frozen-lockfile

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  go-build:
    name: Build Go services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"

      - name: Build generated code
        run: go build ./gen/go/...

      - name: Build all services
        run: |
          for svc in services/*/; do
            [ -f "${svc}cmd/main.go" ] || continue  # skip non-Go (extractor)
            echo "::group::Building ${svc}"
            go build "./${svc}cmd/"
            echo "::endgroup::"
          done

  go-vet:
    name: Vet Go code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"

      - name: Vet all modules
        run: |
          for svc in services/*/; do
            [ -f "${svc}go.mod" ] || continue
            echo "::group::Vetting ${svc}"
            go vet "./${svc}..."
            echo "::endgroup::"
          done
          echo "::group::Vetting pkg/"
          go vet ./pkg/...
          echo "::endgroup::"
          echo "::group::Vetting gen/go/"
          go vet ./gen/go/...
          echo "::endgroup::"

  # ══════════════════════════════════════════════════════════════════════════
  # Gate 2: Test — unit + integration (needs Gate 1)
  # ══════════════════════════════════════════════════════════════════════════

  go-test:
    name: Test Go services
    runs-on: ubuntu-latest
    needs: [go-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"

      - name: Test all modules
        run: |
          for svc in services/*/; do
            [ -f "${svc}go.mod" ] || continue
            echo "::group::Testing ${svc}"
            go test -race -count=1 "./${svc}..."
            echo "::endgroup::"
          done
          echo "::group::Testing pkg/"
          go test -race -count=1 ./pkg/...
          echo "::endgroup::"

  # ══════════════════════════════════════════════════════════════════════════
  # Gate 3: Security — gosec + trivy (needs Gate 1)
  # ══════════════════════════════════════════════════════════════════════════

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [go-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: |
          for svc in services/*/; do
            [ -f "${svc}go.mod" ] || continue
            echo "::group::gosec ${svc}"
            gosec -quiet "./${svc}..."
            echo "::endgroup::"
          done
          echo "::group::gosec pkg/"
          gosec -quiet ./pkg/...
          echo "::endgroup::"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  # ══════════════════════════════════════════════════════════════════════════
  # Gate 4: Docker — build all images (needs Gate 2 + 3)
  # ══════════════════════════════════════════════════════════════════════════

  discover-services:
    name: Discover Go services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        name: Generate service matrix from filesystem
        run: |
          SERVICES=$(ls services/*/Dockerfile 2>/dev/null \
            | grep -v '\.scaffold' | grep -v extractor \
            | sed 's|services/||;s|/Dockerfile||' \
            | jq -R -s 'split("\n") | map(select(. != ""))')
          echo "matrix={\"service\":$SERVICES}" >> $GITHUB_OUTPUT
          echo "Discovered services: $SERVICES"

  docker-build:
    name: "Docker build: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [go-test, security, discover-services]
    strategy:
      matrix: ${{ fromJson(needs.discover-services.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          SERVICE="${{ matrix.service }}"
          echo "::group::Building sda-${SERVICE}"
          docker build \
            --build-arg VERSION=ci-test \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t "sda-${SERVICE}:ci" \
            -f "services/${SERVICE}/Dockerfile" .
          echo "::endgroup::"
          echo "Image sda-${SERVICE}:ci built successfully"
