name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commitlint ────────────────────────────────────────────────────────────
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install commitlint
        run: bun install --frozen-lockfile

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Check CHANGELOG ───────────────────────────────────────────────────────
  changelog:
    name: Check CHANGELOG entry
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG updated
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "CHANGELOG.md" || true)
          if [ -z "$CHANGED" ]; then
            echo "::error::Este PR no actualiza CHANGELOG.md."
            echo "::error::Agregá una entrada en la sección [Unreleased] antes de mergear."
            echo "::error::Ver formato en: https://keepachangelog.com/es/1.1.0/"
            exit 1
          fi
          echo "CHANGELOG.md actualizado ✓"

  # ── Type Check ────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (apps/web)
        if: hashFiles('apps/web/package.json') != ''
        run: bun run --filter=./apps/web type-check

      - name: Type check (apps/cli)
        if: hashFiles('apps/cli/package.json') != ''
        run: bun run --filter=./apps/cli type-check

      - name: Type check (packages/*)
        if: hashFiles('packages/shared/package.json') != ''
        run: bun run --filter='./packages/*' type-check

      - name: Skip (monorepo en construcción)
        if: hashFiles('apps/web/package.json') == ''
        run: echo "apps/web no existe aún — type-check pendiente (Fase 2)"

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        if: hashFiles('apps/web/package.json') != ''
        run: bun run test

      - name: Skip (monorepo en construcción)
        if: hashFiles('apps/web/package.json') == ''
        run: echo "apps/web no existe aún — tests del monorepo pendientes"

  # ── Coverage (solo en PRs) ────────────────────────────────────────────────
  coverage:
    name: Coverage ≥ 80%
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        # Falla si alguna capa está por debajo del threshold definido en bunfig.toml
        # Threshold actual: 0.80 (sube a 0.90 al completar Plan 5 F3, a 0.95 al completar F4)
        run: bun run test:coverage

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint + Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (apps/web)
        if: hashFiles('apps/web/package.json') != ''
        run: bun run --filter=./apps/web lint

      - name: Skip (monorepo en construcción)
        if: hashFiles('apps/web/package.json') == ''
        run: echo "apps/web no existe aún — lint pendiente (Fase 2)"

  # ── Component tests (Plan 6 F3) ───────────────────────────────────────────
  component-tests:
    name: Component Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run component tests
        run: bun test --preload ./apps/web/src/lib/component-test-setup.ts apps/web/src/components
        working-directory: .

  # ── Visual regression (Plan 6 F4) ─────────────────────────────────────────
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Build Storybook
        run: bun run build:storybook
        working-directory: apps/web
      - name: Serve Storybook y esperar
        run: |
          bunx serve apps/web/storybook-static -p 6006 &
          bunx wait-on http://localhost:6006 --timeout 60000
      - name: Run visual regression
        run: bun run test:visual
        working-directory: apps/web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-${{ github.run_id }}
          path: apps/web/tests/visual/snapshots/
          retention-days: 7

  # ── A11y audit (Plan 6 F6) ────────────────────────────────────────────────
  accessibility:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Levantar dev server y esperar
        run: |
          MOCK_RAG=true bun run dev &
          bunx wait-on http://localhost:3000 --timeout 60000
        working-directory: apps/web
        env:
          DATABASE_PATH: ./data/test.db
          JWT_SECRET: test-secret-ci
          SYSTEM_API_KEY: test-api-key-ci
      - name: Run a11y audit
        run: bun run test:a11y
        working-directory: apps/web
