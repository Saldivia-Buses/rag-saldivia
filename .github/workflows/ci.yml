name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['2.0.*', main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate 1: Verify ────────────────────────────────────────────────────────

  events-validate:
    name: Validate event codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"
      - name: Validate services/app/internal/events/gen is in sync with services/app/internal/events/spec
        run: make events-validate

  go-build:
    name: Build Go
    runs-on: ubuntu-latest
    needs: [events-validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"
      - name: Build all services
        run: |
          for svc in services/*/; do
            [ -f "${svc}cmd/main.go" ] || continue
            SVC_NAME=$(basename "$svc")
            echo "::group::Building ${SVC_NAME}"
            go build "./${svc}cmd/"
            echo "::endgroup::"
          done

  go-vet:
    name: Vet Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"
      - name: Vet all modules
        run: |
          for svc in services/*/; do
            [ -f "${svc}go.mod" ] || continue
            SVC_NAME=$(basename "$svc")
            echo "::group::Vetting ${SVC_NAME}"
            go vet "./${svc}..."
            echo "::endgroup::"
          done
          go vet ./pkg/...

  web-typecheck:
    name: Typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install and typecheck
        working-directory: apps/web
        run: |
          bun install --frozen-lockfile
          bun run type-check

  # ── Gate 2: Test ──────────────────────────────────────────────────────────

  go-test:
    name: Test Go
    runs-on: ubuntu-latest
    needs: [go-build, go-vet]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"
      - name: Test all services
        run: |
          for svc in services/*/; do
            [ -f "${svc}go.mod" ] || continue
            SVC_NAME=$(basename "$svc")
            echo "::group::Testing ${SVC_NAME}"
            go test -race -count=1 "./${svc}..."
            echo "::endgroup::"
          done
      - name: Test shared packages
        run: |
          go test -race -count=1 ./pkg/...
      - name: Test tools
        run: |
          for tool in tools/*/; do
            [ -f "${tool}go.mod" ] || continue
            go test -race -count=1 "./${tool}..."
          done

  go-test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [go-build, go-vet]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"
      - name: Verify Docker is available
        run: docker version
      - name: Run integration tests
        run: make test-integration

  # ── Gate 3: Security ──────────────────────────────────────────────────────

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [go-build, go-vet]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: |
          for svc in services/*/; do
            [ -f "${svc}go.mod" ] || continue
            gosec -quiet "./${svc}..."
          done
          gosec -quiet ./pkg/...
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '1'

  # ── Gate 4: Docker images ─────────────────────────────────────────────────

  discover-services:
    name: Discover Go services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          SERVICES=$(ls services/*/Dockerfile 2>/dev/null \
            | grep -v '\.scaffold' | grep -v extractor \
            | sed 's|services/||;s|/Dockerfile||' \
            | jq -Rc -s 'split("\n") | map(select(. != ""))')
          echo "matrix={\"service\":$SERVICES}" >> $GITHUB_OUTPUT

  docker-build:
    name: "Docker: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [go-test, go-test-integration, security, discover-services]
    strategy:
      matrix: ${{ fromJson(needs.discover-services.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=ci-test \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t "sda-${{ matrix.service }}:ci" \
            -f "services/${{ matrix.service }}/Dockerfile" .
