name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commitlint ────────────────────────────────────────────────────────────
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install commitlint
        run: bun install --frozen-lockfile

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Check CHANGELOG ───────────────────────────────────────────────────────
  changelog:
    name: Check CHANGELOG entry
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG updated
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "CHANGELOG.md" || true)
          if [ -z "$CHANGED" ]; then
            echo "::error::Este PR no actualiza CHANGELOG.md."
            echo "::error::Agregá una entrada en la sección [Unreleased] antes de mergear."
            echo "::error::Ver formato en: https://keepachangelog.com/es/1.1.0/"
            exit 1
          fi
          echo "CHANGELOG.md actualizado ✓"

  # ── Type Check ────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (apps/web)
        if: hashFiles('apps/web/package.json') != ''
        run: bun run --filter=./apps/web type-check

      - name: Type check (apps/cli)
        if: hashFiles('apps/cli/package.json') != ''
        run: bun run --filter=./apps/cli type-check

      - name: Type check (packages/*)
        if: hashFiles('packages/shared/package.json') != ''
        run: bun run --filter='./packages/*' type-check

      - name: Skip (monorepo en construcción)
        if: hashFiles('apps/web/package.json') == ''
        run: echo "apps/web no existe aún — type-check pendiente (Fase 2)"

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        if: hashFiles('apps/web/package.json') != ''
        run: bun run test

      - name: Skip (monorepo en construcción)
        if: hashFiles('apps/web/package.json') == ''
        run: echo "apps/web no existe aún — tests del monorepo pendientes"

  # ── Coverage (solo en PRs) ────────────────────────────────────────────────
  coverage:
    name: Coverage ≥ 80%
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        # Falla si alguna capa está por debajo del threshold definido en bunfig.toml
        # Threshold actual: 0.80 (sube a 0.90 al completar Plan 5 F3, a 0.95 al completar F4)
        run: bun run test:coverage

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint + Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (apps/web)
        if: hashFiles('apps/web/package.json') != ''
        run: bun run --filter=./apps/web lint

      - name: Skip (monorepo en construcción)
        if: hashFiles('apps/web/package.json') == ''
        run: echo "apps/web no existe aún — lint pendiente (Fase 2)"
