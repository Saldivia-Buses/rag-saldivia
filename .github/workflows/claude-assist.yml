name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# ══════════════════════════════════════════════════════════════════════════
# @claude mentions in issues and PRs — restricted to org members [DS6].
#
# Rate-limited: max 1 concurrent execution per issue/PR to prevent abuse.
# cancel-in-progress: false so running responses aren't killed by new mentions.
# ══════════════════════════════════════════════════════════════════════════

jobs:
  respond:
    name: Claude Response
    # DS6: Only org members/owners can invoke — prevents external prompt injection
    if: |
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    concurrency:
      group: claude-assist-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: "--model claude-opus-4-6"
