name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# ══════════════════════════════════════════════════════════════════════════
# @claude mentions in issues and PRs — restricted to org members [DS6].
#
# Rate-limited: max 1 concurrent execution per issue/PR to prevent abuse.
# cancel-in-progress: false so running responses aren't killed by new mentions.
# Concurrency at workflow level so multiple runs are properly serialized.
# ══════════════════════════════════════════════════════════════════════════

concurrency:
  group: claude-assist-${{ github.event.issue.number || github.event.pull_request.number || 'unknown' }}
  cancel-in-progress: false

jobs:
  respond:
    name: Claude Response
    # DS6: Only org members/owners can invoke — prevents external prompt injection
    if: |
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }

      - uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1.0.94
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: "--model claude-opus-4-6"
