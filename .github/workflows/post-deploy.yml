name: Post-Deploy Verification

on:
  workflow_run:
    workflows: ["Deploy SDA"]
    types: [completed]

# ══════════════════════════════════════════════════════════════════════════
# Runs after a successful deploy to verify health and auto-close resolved
# triage issues. Only closes issues whose specific service is now healthy —
# never bulk-closes all issues ([2M]).
# ══════════════════════════════════════════════════════════════════════════

jobs:
  verify:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, workstation-1]
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Wait for services to stabilize
        run: sleep 60

      - name: Check health
        run: bash deploy/scripts/health-check.sh --env prod --timeout 60

      - name: Auto-close resolved triage issues
        if: success()
        run: |
          # Get service account token for HealthWatch API
          TOKEN=$(bash deploy/scripts/get-service-token.sh healthwatch)

          # Fetch per-service health from HealthWatch
          HEALTHY=$(curl -sf http://localhost:8014/v1/healthwatch/services \
            -H "Authorization: Bearer $TOKEN" | \
            jq -r '.[] | select(.status == "healthy") | .name') || {
            echo "::warning::Could not fetch service health — skipping auto-close"
            exit 0
          }

          if [ -z "$HEALTHY" ]; then
            echo "No healthy services reported — skipping auto-close"
            exit 0
          fi

          echo "Healthy services: $HEALTHY"

          # Only close issues whose service is now healthy
          gh issue list --label "auto-triage" --state open --json number,labels | \
          jq -c '.[]' | while IFS= read -r issue; do
            NUM=$(echo "$issue" | jq -r '.number')
            SVC=$(echo "$issue" | jq -r '[.labels[].name | select(startswith("service:"))] | .[0] // ""' | sed 's/service://')

            if [ -z "$SVC" ]; then
              echo "Issue #$NUM has no service label — skipping"
              continue
            fi

            if echo "$HEALTHY" | grep -qw "$SVC"; then
              echo "Closing issue #$NUM — $SVC is healthy after deploy"
              gh issue close "$NUM" \
                -c "Auto-closed: $SVC is healthy after deploy ${{ github.event.workflow_run.head_sha }}." || true
            else
              echo "Issue #$NUM — $SVC still not healthy, keeping open"
            fi
          done
