name: Deploy SDA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: [self-hosted, workstation-1]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Link persistent config
        run: |
          cp /etc/sda/.env deploy/.env
          mkdir -p deploy/secrets/dynamic deploy/traefik/dynamic deploy/cloudflare
          cp /etc/sda/dynamic/jwt-*.pem deploy/secrets/dynamic/ 2>/dev/null || true
          cp /etc/sda/traefik/traefik.prod.yml deploy/traefik/ 2>/dev/null || true
          cp /etc/sda/traefik/dynamic/prod.yml deploy/traefik/dynamic/ 2>/dev/null || true
          cp /etc/sda/cloudflare/config.yml deploy/cloudflare/ 2>/dev/null || true

      - name: Preflight checks
        run: bash deploy/scripts/preflight.sh

      - name: Build & deploy
        run: bash deploy/scripts/deploy.sh --cache

      - name: Record deploy
        if: success()
        run: |
          bash deploy/scripts/record-deploy.sh \
            --version "${{ github.ref_name }}" \
            --sha "${{ github.sha }}" \
            --status "success" || true
          echo "::notice::Deploy ${{ github.ref_name }} (${{ github.sha }}) successful"
