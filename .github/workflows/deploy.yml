name: Deploy RAG Saldivia

on:
  # Deploy al hacer tag vX.Y.Z (releases)
  push:
    tags:
      - 'v*'
  # Deploy manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      profile:
        description: 'Deployment profile'
        required: false
        default: 'workstation-1gpu'
      workstation:
        description: 'Target workstation label'
        required: false
        default: 'workstation-1'

jobs:
  deploy:
    name: Deploy to workstation
    runs-on: [self-hosted, "${{ github.event.inputs.workstation || 'workstation-1' }}"]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy
        run: docker compose -f deploy/docker-compose.prod.yml up -d --build --remove-orphans

      - name: Health check
        run: |
          sleep 15
          for port in 8001 8002 8003 8004 8005 8006 8007 8008 8009 8010; do
            echo "Checking :${port}/health..."
            curl -sf http://localhost:${port}/health || echo "WARN: port ${port} not healthy"
          done

      - name: Notify result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          REF="${{ github.ref_name }}"
          echo "Deploy $STATUS — ref=$REF sha=$SHA"
