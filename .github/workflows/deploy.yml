name: Deploy RAG Saldivia

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Deployment profile'
        required: false
        default: 'workstation-1gpu'
      workstation:
        description: 'Target workstation label'
        required: false
        default: 'workstation-1'

jobs:
  deploy:
    runs-on: [self-hosted, "${{ github.event.inputs.workstation || 'workstation-1' }}"]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy
        run: make deploy PROFILE="${{ github.event.inputs.profile || 'workstation-1gpu' }}"

      - name: Health check
        run: make status

      - name: Notify result
        if: always()
        run: |
          STATUS=${{ job.status }}
          SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "Deploy $STATUS — commit $SHA"
          # Conectar con webhook en Fase 13 cuando esté disponible
