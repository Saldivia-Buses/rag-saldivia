name: Deploy SDA

on:
  workflow_dispatch:

concurrency:
  group: deploy-workstation
  cancel-in-progress: true

jobs:
  deploy:
    name: Pull & Restart
    runs-on: [self-hosted, workstation-1]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env
        run: |
          if [ -f /etc/sda/.env ]; then
            cp /etc/sda/.env deploy/.env
          elif [ ! -f deploy/.env ]; then
            cp deploy/.env.example deploy/.env
          fi

      - name: Start infra
        run: docker compose -f deploy/docker-compose.dev.yml up -d postgres redis nats traefik mailpit minio

      - name: Run migrations
        run: |
          sleep 5
          for f in db/platform/migrations/*.up.sql; do
            docker compose -f deploy/docker-compose.dev.yml exec -T postgres psql -U sda sda_platform -v ON_ERROR_STOP=0 < "$f" >/dev/null 2>&1
          done
          for f in db/tenant/migrations/*.up.sql; do
            docker compose -f deploy/docker-compose.dev.yml exec -T postgres psql -U sda sda_tenant_dev -v ON_ERROR_STOP=0 < "$f" >/dev/null 2>&1
          done
          echo "Migrations applied"

      - name: Stop legacy host frontend (if any)
        run: |
          pkill -f 'next-server' 2>/dev/null || true
          pkill -f 'bun.*dev' 2>/dev/null || true

      - name: Build & start services (Go + frontend in Docker)
        run: |
          export GIT_SHA=$(git rev-parse --short HEAD)
          export BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          docker compose -f deploy/docker-compose.dev.yml --profile full up --build -d

      - name: Restart Traefik then web (so Traefik sees web's create event)
        run: |
          docker compose -f deploy/docker-compose.dev.yml restart traefik
          sleep 5
          docker compose -f deploy/docker-compose.dev.yml restart web

      - name: Wait for health + diagnostics
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 10
            STATUS=$(docker inspect deploy-web-1 --format '{{.State.Health.Status}}' 2>/dev/null || echo "?")
            echo "[$((i*10))s] web health: $STATUS"
            [ "$STATUS" = "healthy" ] && break
          done
          echo "--- web healthcheck logs ---"
          docker inspect deploy-web-1 --format '{{json .State.Health}}' | python3 -m json.tool || true
          echo "--- web app logs ---"
          docker logs deploy-web-1 --tail 10 2>&1 || true
          echo "--- exec node check inside container ---"
          docker exec deploy-web-1 node -e "require('http').get('http://localhost:3000/', (r) => { console.log('status:', r.statusCode); process.exit(0); }).on('error', (e) => { console.log('err:', e.message); process.exit(1); })" || true
          echo "--- traefik routers ---"
          curl -s http://localhost:8080/api/http/routers | python3 -c 'import json,sys; print(*sorted([r["name"] for r in json.load(sys.stdin) if "@docker" in r["name"]]),sep="\n")'
