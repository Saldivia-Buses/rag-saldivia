# golangci-lint configuration for SDA Framework.
#
# Uses staticcheck defaults minus the QF (Quickfix) family. QF1003 (tagged
# switch) and QF1012 (Fprintf instead of WriteString+Sprintf) are stylistic
# hints, not bugs, and the codebase consistently uses the older forms. Real
# bugs under SA*, ST*, errcheck, and the other default linters are still
# enforced.

version: "2"

linters:
  enable:
    - forbidigo
  settings:
    staticcheck:
      checks:
        - "-QF1003"
        - "-QF1012"
    forbidigo:
      forbid:
        - pattern: '\bnc\.Publish\('
          msg: "Plan 26: use pkg/spine.Publish or pkg/outbox.PublishTx instead of raw nc.Publish. Pending migrations have //nolint:forbidigo until Fase 3."
      analyze-types: false
  exclusions:
    rules:
      - path: "^pkg/nats/"
        linters: ["forbidigo"]
      - path: "^pkg/spine/"
        linters: ["forbidigo"]
