// Ingest Service gRPC contract.
// Handles document upload and async processing via NATS JetStream.
// Documents are staged to disk, a job is created in the tenant DB,
// and a NATS message triggers the worker to forward the file to the
// NVIDIA RAG Blueprint for vectorization.
// Currently implemented as HTTP in services/ingest — this proto defines
// the inter-service contract for future gRPC migration.
//
// Note: The Upload RPC uses a client-side stream to transfer file bytes.
// For the HTTP API, multipart/form-data is used instead.

syntax = "proto3";

package sda.ingest.v1;

option go_package = "github.com/Camionerou/rag-saldivia/gen/go/ingest/v1;ingestv1";

import "google/protobuf/timestamp.proto";

// IngestService provides document ingestion and job tracking.
// Upload uses client-side streaming to transfer files efficiently.
// All job operations verify ownership — users can only see their own jobs.
service IngestService {
  // Upload accepts a document via client-side streaming and queues it
  // for async processing. Returns immediately with job status "pending".
  rpc Upload(stream UploadRequest) returns (Job);

  // ListJobs returns all ingest jobs for the authenticated user.
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);

  // GetJob returns a single ingest job by ID, verifying ownership.
  rpc GetJob(GetJobRequest) returns (Job);

  // DeleteJob removes a job record, verifying ownership.
  rpc DeleteJob(DeleteJobRequest) returns (DeleteJobResponse);
}

// ── Upload ──────────────────────────────────────────────────────────────

// UploadRequest is sent as a client-side stream. The first message must
// contain metadata (file_name, collection, etc.). Subsequent messages
// contain file content chunks.
message UploadRequest {
  oneof data {
    // File metadata — must be the first message in the stream.
    UploadMetadata metadata = 1;

    // File content chunk. Sent in subsequent messages.
    bytes chunk = 2;
  }
}

// UploadMetadata contains file information sent as the first message.
message UploadMetadata {
  // Tenant slug for collection namespacing. Set by auth middleware.
  string tenant_slug = 1;

  // User UUID. Set by auth middleware from JWT.
  string user_id = 2;

  // RAG collection to ingest the document into.
  string collection = 3;

  // Original file name (e.g. "manual.pdf").
  string file_name = 4;

  // File size in bytes.
  int64 file_size = 5;
}

// ── Job ─────────────────────────────────────────────────────────────────

// Job represents an ingest job tracking document processing.
message Job {
  // Job UUID.
  string id = 1;

  // Owner user UUID.
  string user_id = 2;

  // Target RAG collection name.
  string collection = 3;

  // Original uploaded file name.
  string file_name = 4;

  // File size in bytes.
  int64 file_size = 5;

  // Processing status: "pending", "processing", "completed", "failed".
  string status = 6;

  // Error message if status is "failed". Empty otherwise.
  optional string error = 7;

  // When the job was created (upload time).
  google.protobuf.Timestamp created_at = 8;

  // When the job status was last updated.
  google.protobuf.Timestamp updated_at = 9;
}

// ── List Jobs ───────────────────────────────────────────────────────────

message ListJobsRequest {
  // User UUID. Set by auth middleware from JWT.
  string user_id = 1;

  // Maximum number of jobs to return (1-100, default 50).
  int32 limit = 2;
}

message ListJobsResponse {
  // Ingest jobs ordered by most recent first.
  repeated Job jobs = 1;
}

// ── Get Job ─────────────────────────────────────────────────────────────

message GetJobRequest {
  // Job UUID to retrieve.
  string job_id = 1;

  // User UUID for ownership verification.
  string user_id = 2;
}

// ── Delete Job ──────────────────────────────────────────────────────────

message DeleteJobRequest {
  // Job UUID to delete.
  string job_id = 1;

  // User UUID for ownership verification.
  string user_id = 2;
}

message DeleteJobResponse {
  // Empty on success. NOT_FOUND if job doesn't exist for user.
}
