// RAG Service gRPC contract.
// Thin proxy to the NVIDIA RAG Blueprint (:8081) that adds tenant context
// (collection namespacing), permission checks, and SSE-to-gRPC streaming.
// Currently implemented as HTTP in services/rag — this proto defines
// the inter-service contract for future gRPC migration.

syntax = "proto3";

package sda.rag.v1;

option go_package = "github.com/Camionerou/rag-saldivia/gen/go/rag/v1;ragv1";

import "google/protobuf/empty.proto";

// RagService provides RAG generation and collection management.
// Collections are automatically namespaced by tenant slug to ensure
// data isolation (e.g. "acme-docs" for tenant "acme").
service RagService {
  // Generate sends a streaming RAG query to the NVIDIA Blueprint.
  // Returns a server-side stream of content chunks and source citations.
  rpc Generate(GenerateRequest) returns (stream GenerateResponse);

  // ListCollections returns all RAG collections for the current tenant.
  // Collections are filtered by tenant prefix and returned without it.
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);

  // Health checks if the NVIDIA Blueprint is reachable and healthy.
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
}

// ── Generate ────────────────────────────────────────────────────────────

// ChatMessage is a single message in the conversation history.
message ChatMessage {
  // Message role: "user", "assistant", or "system".
  string role = 1;

  // Message text content.
  string content = 2;
}

message GenerateRequest {
  // Conversation history. Must contain at least one message.
  repeated ChatMessage messages = 1;

  // RAG collection name to query against. Will be prefixed with tenant slug.
  string collection_name = 2;

  // Sampling temperature (0.0 - 2.0). Higher = more creative.
  double temperature = 3;

  // Top-p nucleus sampling (0.0 - 1.0).
  double top_p = 4;

  // Maximum tokens to generate in the response.
  int32 max_tokens = 5;

  // Number of top results from vector DB search.
  int32 vdb_top_k = 6;

  // Number of top results after reranking.
  int32 reranker_top_k = 7;

  // Whether to use the knowledge base for RAG retrieval.
  bool use_knowledge_base = 8;
}

// GenerateResponse is a single chunk in the streaming response.
message GenerateResponse {
  // Text content chunk. May be partial (streaming).
  string content = 1;

  // Source citations from the RAG retrieval. Only present in the
  // final chunk or accumulated across chunks.
  repeated Source sources = 2;

  // Whether this is the last chunk in the stream.
  bool done = 3;
}

// Source represents a document citation from RAG retrieval.
message Source {
  // Document or chunk title.
  string title = 1;

  // Source content snippet.
  string content = 2;

  // Relevance score from vector search (0.0 - 1.0).
  float score = 3;

  // Original document file name.
  string document_name = 4;
}

// ── List Collections ────────────────────────────────────────────────────

message ListCollectionsRequest {
  // Tenant slug for collection filtering. Set by auth middleware.
  string tenant_slug = 1;
}

message ListCollectionsResponse {
  // Collection names (without tenant prefix).
  repeated string collections = 1;
}

// ── Health ───────────────────────────────────────────────────────────────

message HealthResponse {
  // Service status: "ok" or "unhealthy".
  string status = 1;

  // Service identifier.
  string service = 2;
}
