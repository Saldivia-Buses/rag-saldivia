// Notification Service gRPC contract.
// Manages in-app and email notifications per tenant user.
// Consumes NATS events from other services and creates notifications.
// Currently implemented as HTTP in services/notification — this proto
// defines the inter-service contract for future gRPC migration.

syntax = "proto3";

package sda.notification.v1;

option go_package = "github.com/Camionerou/rag-saldivia/proto/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";

// NotificationService provides notification management and preferences.
// All operations are scoped to the authenticated user.
service NotificationService {
  // ListNotifications returns notifications for the authenticated user.
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);

  // UnreadCount returns the number of unread notifications for the user.
  rpc UnreadCount(UnreadCountRequest) returns (UnreadCountResponse);

  // MarkRead marks a single notification as read.
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);

  // MarkAllRead marks all unread notifications as read for the user.
  rpc MarkAllRead(MarkAllReadRequest) returns (MarkAllReadResponse);

  // GetPreferences returns notification preferences for the user.
  // Returns sensible defaults if no preferences have been saved.
  rpc GetPreferences(GetPreferencesRequest) returns (Preferences);

  // UpdatePreferences creates or updates notification preferences.
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (Preferences);
}

// ── Notification ────────────────────────────────────────────────────────

// Notification represents an in-app notification.
message Notification {
  // Notification UUID.
  string id = 1;

  // Recipient user UUID.
  string user_id = 2;

  // Notification type (e.g. "auth.login_success", "chat.new_message",
  // "ingest.completed").
  string type = 3;

  // Notification title (short, human-readable).
  string title = 4;

  // Notification body text. May be empty for simple notifications.
  string body = 5;

  // Additional structured data as JSON (e.g. session_id, job_id).
  bytes data = 6;

  // Delivery channel: "in_app", "email", or "both".
  string channel = 7;

  // Whether this notification has been read.
  bool is_read = 8;

  // When the notification was read. Only set if is_read is true.
  optional google.protobuf.Timestamp read_at = 9;

  // When the notification was created.
  google.protobuf.Timestamp created_at = 10;
}

// ── List Notifications ──────────────────────────────────────────────────

message ListNotificationsRequest {
  // User UUID. Set by auth middleware from JWT.
  string user_id = 1;

  // If true, only return unread notifications.
  bool unread_only = 2;

  // Maximum number of notifications to return (1-100, default 50).
  int32 limit = 3;
}

message ListNotificationsResponse {
  // Notifications ordered by most recent first.
  repeated Notification notifications = 1;
}

// ── Unread Count ────────────────────────────────────────────────────────

message UnreadCountRequest {
  // User UUID. Set by auth middleware from JWT.
  string user_id = 1;
}

message UnreadCountResponse {
  // Number of unread notifications.
  int32 count = 1;
}

// ── Mark Read ───────────────────────────────────────────────────────────

message MarkReadRequest {
  // Notification UUID to mark as read.
  string notification_id = 1;

  // User UUID for ownership verification.
  string user_id = 2;
}

message MarkReadResponse {
  // Empty on success. NOT_FOUND if notification doesn't exist for user.
}

// ── Mark All Read ───────────────────────────────────────────────────────

message MarkAllReadRequest {
  // User UUID. All unread notifications for this user will be marked read.
  string user_id = 1;
}

message MarkAllReadResponse {
  // Number of notifications that were marked as read.
  int64 marked = 1;
}

// ── Preferences ─────────────────────────────────────────────────────────

// Preferences holds a user's notification delivery preferences.
message Preferences {
  // User UUID.
  string user_id = 1;

  // Whether email notifications are enabled.
  bool email_enabled = 2;

  // Whether in-app notifications are enabled.
  bool in_app_enabled = 3;

  // Quiet hours start time in HH:MM format (e.g. "22:00").
  // No notifications during quiet hours.
  optional string quiet_start = 4;

  // Quiet hours end time in HH:MM format (e.g. "08:00").
  optional string quiet_end = 5;

  // List of notification types to mute (e.g. ["auth.login_success"]).
  repeated string muted_types = 6;

  // When preferences were last updated.
  google.protobuf.Timestamp updated_at = 7;
}

message GetPreferencesRequest {
  // User UUID. Set by auth middleware from JWT.
  string user_id = 1;
}

message UpdatePreferencesRequest {
  // User UUID. Set by auth middleware from JWT.
  string user_id = 1;

  // Whether email notifications are enabled.
  bool email_enabled = 2;

  // Whether in-app notifications are enabled.
  bool in_app_enabled = 3;

  // Quiet hours start time in HH:MM format. Null to disable quiet hours.
  optional string quiet_start = 4;

  // Quiet hours end time in HH:MM format. Null to disable quiet hours.
  optional string quiet_end = 5;

  // List of notification types to mute. Empty list to unmute all.
  repeated string muted_types = 6;
}
