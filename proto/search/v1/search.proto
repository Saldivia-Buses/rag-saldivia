syntax = "proto3";

package sda.search.v1;

option go_package = "github.com/Camionerou/rag-saldivia/gen/go/search/v1;searchv1";

// SearchService provides tree-based document search.
service SearchService {
  // Query performs a 3-phase tree search across document collections.
  rpc Query(SearchRequest) returns (SearchResponse);
}

message SearchRequest {
  string query = 1;
  optional string collection_id = 2;
  int32 max_nodes = 3;
}

message SearchResponse {
  string query = 1;
  repeated Selection selections = 2;
  int32 duration_ms = 3;
}

message Selection {
  string document = 1;
  string document_id = 2;
  repeated string node_ids = 3;
  repeated string sections = 4;
  repeated int32 pages = 5;
  string text = 6;
  bytes tables = 7;
  bytes images = 8;
}
