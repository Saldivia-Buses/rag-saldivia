[test]
# Activar cobertura con: bun test --coverage
# El threshold se verifica solo cuando --coverage está presente.
#
# Estrategia: ver ADR-006 (docs/decisions/006-testing-strategy.md)
# - line: 0.95 — meta final alcanzada en Plan 5 F4
# - function: 0.50 — las relations de Drizzle en schema.ts no son
#   ejercidas por tests (son usadas internamente por el ORM)
#
# Los 14 query files de packages/db usan local helpers (no importan el
# query file directamente). Para cobertura real usar _injectDbForTesting.

coverageSkipTestFiles = true

[test.coverageThreshold]
line = 0.95
function = 0.50
