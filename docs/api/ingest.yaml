openapi: "3.1.0"
info:
  title: Ingest Service
  version: "1.0.0"
  description: |
    Document ingestion pipeline for the SDA Framework. Handles file upload,
    processing queue management, and document-to-vector conversion via the
    NVIDIA RAG Blueprint. Supports multipart file upload with asynchronous
    processing — uploads return 202 Accepted and processing happens via
    NATS job queue.

servers:
  - url: http://localhost:8007
    description: Local development

tags:
  - name: upload
    description: Document upload
  - name: jobs
    description: Ingestion job management

security:
  - bearerAuth: []

paths:
  /v1/ingest/upload:
    post:
      operationId: uploadDocument
      summary: Upload a document for ingestion
      description: |
        Accepts a multipart file upload and enqueues it for processing.
        Returns 202 Accepted immediately — the actual document processing
        (text extraction, chunking, embedding, Milvus insertion) happens
        asynchronously via the NATS job queue.

        Supported file types: PDF, DOCX, TXT, CSV, XLSX, PPTX, MD.

        The response includes a job ID that can be used to track
        processing status via GET /v1/ingest/jobs/{jobID}.
      tags: [upload]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadRequest"
      responses:
        "202":
          description: Upload accepted, processing enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Invalid request (missing file, unsupported type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "invalid_file"
                message: "unsupported file type: .exe"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "file_too_large"
                message: "maximum file size is 100MB"

  /v1/ingest/jobs:
    get:
      operationId: listJobs
      summary: List ingestion jobs
      description: |
        Returns all ingestion jobs for the current tenant, ordered by
        creation time (most recent first). Includes jobs in all states.
      tags: [jobs]
      responses:
        "200":
          description: List of ingestion jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IngestJob"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/ingest/jobs/{jobID}:
    get:
      operationId: getJob
      summary: Get job status
      description: |
        Returns the current status and details of a specific ingestion job.
        Poll this endpoint to track processing progress.
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJob"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteJob
      summary: Delete an ingestion job
      description: |
        Deletes an ingestion job record. If the job is still processing,
        it will be cancelled. Does not remove already-ingested vectors
        from Milvus — use the RAG service for collection management.
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobID"
      responses:
        "204":
          description: Job deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    JobID:
      name: jobID
      in: path
      required: true
      description: Ingestion job UUID
      schema:
        type: string
        format: uuid

  schemas:
    UploadRequest:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: Document file to ingest
        collection:
          type: string
          description: |
            Target Milvus collection. If omitted, uses the tenant default
            collection.
          example: saldivia-docs
        metadata:
          type: string
          description: |
            Optional JSON string with custom metadata to attach to the
            document (e.g., department, tags, source).
          example: '{"department": "maintenance", "tags": ["fleet", "manual"]}'

    UploadResponse:
      type: object
      required:
        - job_id
        - status
        - message
      properties:
        job_id:
          type: string
          format: uuid
          description: Job ID for tracking processing status
          example: bb0e8400-e29b-41d4-a716-446655440040
        status:
          type: string
          enum: [queued]
          example: queued
        message:
          type: string
          example: document accepted for processing

    IngestJob:
      type: object
      required:
        - id
        - filename
        - collection
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: bb0e8400-e29b-41d4-a716-446655440040
        filename:
          type: string
          example: fleet-manual-2026.pdf
        file_size:
          type: integer
          description: File size in bytes
          example: 4521984
        collection:
          type: string
          example: saldivia-docs
        status:
          type: string
          enum: [queued, processing, completed, failed]
          example: processing
        chunks:
          type: integer
          nullable: true
          description: Number of text chunks created (available after completion)
          example: 87
        error:
          type: string
          nullable: true
          description: Error message if the job failed
          example: null
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Custom metadata attached during upload
          example:
            department: maintenance
            tags: [fleet, manual]
        created_at:
          type: string
          format: date-time
          example: "2026-04-03T14:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-03T14:02:30Z"

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: not_found
        message:
          type: string
          example: job not found
