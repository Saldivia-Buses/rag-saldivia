openapi: "3.1.0"
info:
  title: WebSocket Hub
  version: "1.0.0"
  description: |
    Real-time communication hub for the SDA Framework. Maintains persistent
    WebSocket connections with authenticated clients and provides a
    subscribe/publish event system. Routes mutations to backend services
    via gRPC and pushes NATS events to connected browsers.

    This service uses WebSocket protocol (not REST) for its primary
    functionality. The OpenAPI spec documents the HTTP endpoints used
    for connection establishment and health monitoring.

servers:
  - url: http://localhost:8002
    description: Local development

tags:
  - name: websocket
    description: WebSocket connection management
  - name: health
    description: Service health checks

security:
  - bearerAuth: []

paths:
  /v1/ws:
    get:
      operationId: connectWebSocket
      summary: Establish WebSocket connection
      description: |
        Upgrades the HTTP connection to a WebSocket. The client must
        provide a valid JWT as a query parameter or in the Authorization
        header. Once connected, the client can subscribe to channels and
        receive real-time events.

        **Protocol:**
        After the WebSocket handshake, communication uses JSON frames:

        **Client to server (subscribe):**
        ```json
        {"type": "subscribe", "channel": "notifications"}
        ```

        **Client to server (mutation):**
        ```json
        {"type": "mutation", "service": "chat", "method": "createSession", "payload": {"title": "New chat"}}
        ```

        **Server to client (event):**
        ```json
        {"type": "event", "channel": "notifications", "payload": {"id": "...", "title": "Document processed"}}
        ```

        **Server to client (mutation response):**
        ```json
        {"type": "response", "id": "req-123", "payload": {"id": "...", "title": "New chat"}}
        ```

        **Channels:**
        - `notifications` — real-time notification delivery
        - `chat:{sessionID}` — streaming AI responses for a chat session
        - `ingest:{jobID}` — ingestion job progress updates
        - `presence` — online user presence for the tenant

        **Heartbeat:**
        Server sends ping frames every 30 seconds. Client must respond
        with pong within 10 seconds or the connection is terminated.
      tags: [websocket]
      parameters:
        - name: token
          in: query
          required: false
          description: |
            JWT access token (alternative to Authorization header for
            environments where WebSocket headers are not supported).
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols — WebSocket connection established
        "401":
          description: Missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "unauthorized"
                message: "valid JWT required for WebSocket connection"

  /v1/ws/stats:
    get:
      operationId: getConnectionStats
      summary: Get WebSocket connection statistics
      description: |
        Returns current connection statistics for the WebSocket Hub.
        Useful for monitoring and debugging. Requires platform admin role.
      tags: [websocket]
      responses:
        "200":
          description: Connection statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — platform admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns service health status. No authentication required.
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: ws

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ConnectionStats:
      type: object
      required:
        - total_connections
        - connections_by_tenant
        - uptime_seconds
      properties:
        total_connections:
          type: integer
          description: Total active WebSocket connections
          example: 42
        connections_by_tenant:
          type: object
          additionalProperties:
            type: integer
          description: Active connections grouped by tenant slug
          example:
            saldivia: 15
            acme-transport: 27
        uptime_seconds:
          type: integer
          description: Service uptime in seconds
          example: 86400

    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: [ok, degraded]
          example: ok
        service:
          type: string
          example: ws

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: unauthorized
        message:
          type: string
          example: valid JWT required for WebSocket connection
