version: "3.8"

# RAG Saldivia — Development stack
# Para el stack completo de NVIDIA (Milvus, NIMs, NV-Ingest), ver vendor/rag-blueprint/docker-compose.yaml
# Este archivo agrega los servicios propios del overlay: Redis + (opcional) Next.js

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
