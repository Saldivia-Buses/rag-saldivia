# RAG Saldivia — Docker Compose overrides
# Applied on top of blueprint compose files via:
#   docker compose -f <blueprint-compose> -f <this-file> up -d
#
# NOTE: Only overrides services in docker-compose-rag-server.yaml (rag-server, rag-frontend).
# Milvus, ingestor, and NIMs are managed by separate stacks.

services:
  rag-server:
    volumes:
      - ${SALDIVIA_ROOT}/config/prompt.yaml:/opt/saldivia/prompt.yaml:ro
    environment:
      - PROMPT_CONFIG_FILE=/opt/saldivia/prompt.yaml
