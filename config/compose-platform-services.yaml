# config/compose-platform-services.yaml
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  mode-manager:
    build:
      context: ${SALDIVIA_ROOT}
      dockerfile: services/mode-manager/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - GPU_MEMORY_GB=${GPU_MEMORY_GB:-98}
      - IDLE_TIMEOUT=${MODE_IDLE_TIMEOUT:-300}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis

  ingestion-worker:
    build:
      context: ${SALDIVIA_ROOT}
      dockerfile: services/mode-manager/Dockerfile
    command: ["python", "-m", "saldivia.ingestion_worker"]
    environment:
      - REDIS_URL=redis://redis:6379
      - INGESTOR_URL=http://ingestor-server:8082
    depends_on:
      - redis
    restart: unless-stopped

  auth-gateway:
    build:
      context: ${SALDIVIA_ROOT}
      dockerfile: services/auth-gateway/Dockerfile
    environment:
      - RAG_SERVER_URL=http://rag-server:8081
      - INGESTOR_URL=http://ingestor-server:8082
      - MILVUS_HOST=milvus-standalone
      - BYPASS_AUTH=${BYPASS_AUTH:-false}
    ports:
      - "9000:8090"
    volumes:
      - ${SALDIVIA_ROOT}/data:/app/data
    depends_on:
      - redis
    networks:
      - default

volumes:
  redis-data:

networks:
  default:
    name: nvidia-rag
    external: true
