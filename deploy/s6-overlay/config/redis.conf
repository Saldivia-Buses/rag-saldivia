# Redis config for the all-in-one tenant container (ADR 023).
# Single-tenant, local-only, AOF-persistence on the host volume.

bind 127.0.0.1 -::1
port 6379
protected-mode yes

dir /data/redis
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
# RDB off — AOF is enough for the single-tenant workload.
save ""

loglevel notice
logfile ""
daemonize no
