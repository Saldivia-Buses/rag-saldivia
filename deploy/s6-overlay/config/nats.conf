# NATS server config for the all-in-one tenant container (ADR 023).
# Single-tenant, local-only — everyone talking to this NATS is already inside
# the same container. No auth, no TLS, no clustering.

server_name: sda-tenant
listen: 127.0.0.1:4222
http: 127.0.0.1:8222

jetstream {
    store_dir: /data/nats
    max_memory_store: 256MB
    max_file_store: 10GB
}

max_payload: 8MB
write_deadline: 10s

# Logs go to stdout by default, inherited via the s6 supervision tree.
logtime: false
