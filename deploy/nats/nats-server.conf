# NATS Server — Production configuration with per-service authorization.
# Each service can only publish/subscribe to its authorized subjects.
#
# Post ADR 025: the `app` monolith absorbs auth + platform + feedback +
# bigbrother + healthwatch + traces + ingest + search + agent + chat +
# ws + notification, so those per-service NATS users collapsed into a
# single `app` user with `tenant.>` pub/sub (the union of what every
# absorbed service needed). Isolation on the NATS layer was never the
# load-bearing defense — JWT + tenant slug in the subject path is.

jetstream {
    store_dir: /data
    max_mem: 128MB
    max_file: 1GB
}

authorization {
    users = [
        # App monolith: publishes on every tenant.* namespace the absorbed
        # services used (notify, auth, chat, ingest, traces, feedback,
        # module, bigbrother) and subscribes broadly because WS bridges
        # tenant.> to browser clients and the feedback / healthwatch / traces
        # consumers listen under their own namespaces.
        {
            user: "app"
            password: $APP_NATS_PASS
            permissions: {
                publish: ["tenant.>"]
                subscribe: ["tenant.>"]
            }
        },
        # Extractor service (Python): consumes extraction jobs, publishes results
        {
            user: "extractor"
            password: $EXTRACTOR_NATS_PASS
            permissions: {
                publish: ["tenant.*.extractor.*"]
                subscribe: ["tenant.*.extractor.>"]
            }
        },
        # ERP: publishes notifications + broadcasts for all ERP modules
        {
            user: "erp"
            password: $ERP_NATS_PASS
            permissions: {
                publish: ["tenant.*.notify.*", "tenant.*.erp_*"]
                subscribe: []
            }
        }
    ]
}
