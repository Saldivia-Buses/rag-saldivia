# NATS Server — Production configuration with per-service authorization.
# Each service can only publish/subscribe to its authorized subjects.

jetstream {
    store_dir: /data
    max_mem: 128MB
    max_file: 1GB
}

authorization {
    users = [
        # Auth service: publishes login/auth events for notifications
        {
            user: "auth"
            password: $AUTH_NATS_PASS
            permissions: {
                publish: ["tenant.*.notify.*", "tenant.*.auth.*"]
                subscribe: []
            }
        },
        # Chat service: publishes new message events
        {
            user: "chat"
            password: $CHAT_NATS_PASS
            permissions: {
                publish: ["tenant.*.notify.*", "tenant.*.chat.*"]
                subscribe: []
            }
        },
        # Notification service: consumes all notify events
        {
            user: "notification"
            password: $NOTIF_NATS_PASS
            permissions: {
                publish: []
                subscribe: ["tenant.*.notify.>"]
            }
        },
        # WebSocket Hub: subscribes to everything to bridge to browsers
        {
            user: "ws"
            password: $WS_NATS_PASS
            permissions: {
                publish: []
                subscribe: ["tenant.>"]
            }
        },
        # Ingest service: publishes pipeline events + notifications
        {
            user: "ingest"
            password: $INGEST_NATS_PASS
            permissions: {
                publish: ["tenant.*.notify.*", "tenant.*.ingest.*"]
                subscribe: ["tenant.*.ingest.>"]
            }
        },
        # Feedback service: consumes feedback events, publishes alerts
        {
            user: "feedback"
            password: $FEEDBACK_NATS_PASS
            permissions: {
                publish: ["tenant.*.notify.*"]
                subscribe: ["tenant.*.feedback.>"]
            }
        },
        # Agent service: publishes traces + feedback events
        {
            user: "agent"
            password: $AGENT_NATS_PASS
            permissions: {
                publish: ["tenant.*.traces.*", "tenant.*.feedback.*", "tenant.*.notify.*"]
                subscribe: []
            }
        },
        # Traces service: consumes execution trace events
        {
            user: "traces"
            password: $TRACES_NATS_PASS
            permissions: {
                publish: []
                subscribe: ["tenant.*.traces.>"]
            }
        },
        # Platform service: publishes lifecycle events (tenant/module changes)
        {
            user: "platform"
            password: $PLATFORM_NATS_PASS
            permissions: {
                publish: ["tenant.*.notify.*", "tenant.*.module.*"]
                subscribe: []
            }
        },
        # Extractor service (Python): consumes extraction jobs, publishes results
        {
            user: "extractor"
            password: $EXTRACTOR_NATS_PASS
            permissions: {
                publish: ["tenant.*.extractor.*"]
                subscribe: ["tenant.*.extractor.>"]
            }
        },
        # BigBrother: publishes device events (own namespace only, no notify)
        {
            user: "bigbrother"
            password: $BIGBROTHER_NATS_PASS
            permissions: {
                publish: ["tenant.*.bigbrother.>"]
                subscribe: []
            }
        }
    ]
}
