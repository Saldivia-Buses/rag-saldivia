# SDA Framework — Development Stack
#
# Two modes:
#   make dev       → infra only (postgres, redis, nats, traefik, mailpit)
#                    run Go services on host: go run ./services/auth/cmd/...
#                    traefik routes via deploy/traefik/dynamic/dev.yml → host.docker.internal
#
#   make dev-full  → infra + all Go services in Docker
#                    traefik auto-discovers containers via Docker labels (priority 100)
#                    file-based dev.yml routes (priority 1) serve as fallback

x-service-defaults: &service-defaults
  build:
    context: ..
  restart: unless-stopped
  depends_on:
    db-init:
      condition: service_completed_successfully
    redis:
      condition: service_healthy
    nats:
      condition: service_healthy

x-env-common: &env-common
  NATS_URL: nats://nats:4222
  # DEV ONLY — production uses Docker secrets (deploy/secrets/).
  # Ed25519 keys (base64-encoded PEM) — generated by deploy/scripts/gen-jwt-keys.sh
  JWT_PRIVATE_KEY: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1DNENBUUF3QlFZREsyVndCQ0lFSUZvSXFxYU1BcjVjYnZFSE9Rc2g0cnVQTUUzeCtRSkVlVDByNnkxQ2tjMmgKLS0tLS1FTkQgUFJJVkFURSBLRVktLS0tLQo=
  JWT_PUBLIC_KEY: LS0tLS1CRUdJTiBQVUJMSUMgS0VZLS0tLS0KTUNvd0JRWURLMlZ3QXlFQVpMSmkrZmtPbitKUllNQmc4VkVBTkh2bXRzZUxQK3JmRFdFUStZL3ZIU0E9Ci0tLS0tRU5EIFBVQkxJQyBLRVktLS0tLQo=
  POSTGRES_TENANT_URL: postgres://sda:sda_dev@postgres:5432/sda_tenant_dev?sslmode=disable
  # MinIO storage — Docker-internal hostname. When running Go on host
  # (make dev), override: STORAGE_ENDPOINT=http://localhost:9000
  STORAGE_ENDPOINT: http://minio:9000
  STORAGE_BUCKET: sda-documents
  STORAGE_ACCESS_KEY: sda-admin
  STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-sda-dev-secret}
  # OpenTelemetry — requires observability stack running (deploy/observability/).
  # If otel-collector is not reachable, tracing degrades gracefully (disabled).
  # For host dev: OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4317
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-localhost:4317}

services:

  # ── Infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sda
      POSTGRES_PASSWORD: sda_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sda"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["--js", "--sd", "/data", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"   # localhost only — not exposed to network
      - "127.0.0.1:8222:8222"   # monitoring, localhost only
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  traefik:
    image: traefik:v3
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    extra_hosts:
      # In WSL2, host-gateway may not resolve to the WSL IP.
      # Override with the actual WSL IP: ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}'
      # Or set SDA_HOST_IP env var before running docker compose.
      - "host.docker.internal:${SDA_HOST_IP:-host-gateway}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: sda-admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sda-dev-secret}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── SGLang Model Servers (profile: gpu) ─────────────────────────────
  # Only start with: docker compose --profile gpu up
  # Requires NVIDIA GPU with Container Toolkit installed.
  # Each instance serves exactly one model on its own port.

  sglang-ocr:
    image: lmsysorg/sglang:latest-nvidia-gpu
    profiles: [gpu]
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model
      - PaddlePaddle/PaddleOCR-VL-1.5
      - --port
      - "8000"
      - --host
      - "0.0.0.0"
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=${SDA_GPU_DEVICES:-0}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  sglang-vision:
    image: lmsysorg/sglang:latest-nvidia-gpu
    profiles: [gpu]
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model
      - Qwen/Qwen3.5-9B
      - --port
      - "8000"
      - --host
      - "0.0.0.0"
    ports:
      - "127.0.0.1:8101:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=${SDA_GPU_DEVICES:-0}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── Database Init ──────────────────────────────────────────────────────
  # Runs migrations + seed on first boot. Exits after completion.
  # Re-running is safe (all statements use IF NOT EXISTS / ON CONFLICT).

  db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ../db:/db:ro
    environment:
      PLATFORM_DB_URL: postgres://sda:sda_dev@postgres:5432/sda_platform?sslmode=disable
      TENANT_DB_URL: postgres://sda:sda_dev@postgres:5432/sda_tenant_dev?sslmode=disable
      PGPASSWORD: sda_dev
    entrypoint: ["/bin/bash", "-c", "/scripts/migrate.sh && /scripts/seed.sh"]
    restart: "no"

  # ── Go Services (profile: full) ──────────────────────────────────────
  # Only start with: docker compose --profile full up --build
  # Traefik auto-discovers these via Docker labels (priority 100).

  auth:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    environment:
      <<: *env-common
      AUTH_PORT: "8001"
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
    ports:
      - "8001:8001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-docker.rule=PathPrefix(`/v1/auth`)"
      - "traefik.http.routers.auth-docker.entrypoints=web"
      - "traefik.http.routers.auth-docker.priority=100"
      - "traefik.http.services.auth-docker.loadbalancer.server.port=8001"

  ws:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/ws/Dockerfile
    environment:
      <<: *env-common
      WS_PORT: "8002"
      REDIS_URL: redis:6379
      CHAT_GRPC_URL: chat:50052
      # DEV ONLY — production must use explicit origins
      WS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:80"
    ports:
      - "8002:8002"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws-docker.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.ws-docker.entrypoints=web"
      - "traefik.http.routers.ws-docker.priority=100"
      - "traefik.http.services.ws-docker.loadbalancer.server.port=8002"

  chat:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/chat/Dockerfile
    environment:
      <<: *env-common
      CHAT_PORT: "8003"
      CHAT_GRPC_PORT: "50052"
      REDIS_URL: redis:6379
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
    ports:
      - "8003:8003"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat-docker.rule=PathPrefix(`/v1/chat`)"
      - "traefik.http.routers.chat-docker.entrypoints=web"
      - "traefik.http.routers.chat-docker.priority=100"
      - "traefik.http.services.chat-docker.loadbalancer.server.port=8003"

  agent:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/agent/Dockerfile
    environment:
      <<: *env-common
      AGENT_PORT: "8004"
      SGLANG_LLM_URL: http://host.docker.internal:8102
      SEARCH_SERVICE_URL: http://host.docker.internal:8010
      INGEST_SERVICE_URL: http://host.docker.internal:8007
      NOTIFICATION_SERVICE_URL: http://host.docker.internal:8005
      ASTRO_SERVICE_URL: http://host.docker.internal:8011
      LLM_API_KEY: ${LLM_API_KEY:-}
      SEARCH_GRPC_URL: search:50051
    ports:
      - "8004:8004"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent-docker.rule=PathPrefix(`/v1/agent`)"
      - "traefik.http.routers.agent-docker.entrypoints=web"
      - "traefik.http.routers.agent-docker.priority=100"
      - "traefik.http.services.agent-docker.loadbalancer.server.port=8004"

  notification:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/notification/Dockerfile
    environment:
      <<: *env-common
      NOTIFICATION_PORT: "8005"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@${SDA_DOMAIN:-localhost}
    ports:
      - "8005:8005"
    depends_on:
      db-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      mailpit:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification-docker.rule=PathPrefix(`/v1/notifications`)"
      - "traefik.http.routers.notification-docker.entrypoints=web"
      - "traefik.http.routers.notification-docker.priority=100"
      - "traefik.http.services.notification-docker.loadbalancer.server.port=8005"

  platform:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/platform/Dockerfile
    environment:
      <<: *env-common
      PLATFORM_PORT: "8006"
      POSTGRES_PLATFORM_URL: postgres://sda:sda_dev@postgres:5432/sda_platform?sslmode=disable
    ports:
      - "8006:8006"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-docker.rule=PathPrefix(`/v1/platform`)"
      - "traefik.http.routers.platform-docker.entrypoints=web"
      - "traefik.http.routers.platform-docker.priority=100"
      - "traefik.http.services.platform-docker.loadbalancer.server.port=8006"
      - "traefik.http.routers.flags-docker.rule=PathPrefix(`/v1/flags`)"
      - "traefik.http.routers.flags-docker.entrypoints=web"
      - "traefik.http.routers.flags-docker.service=platform-docker"

  ingest:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/ingest/Dockerfile
    environment:
      <<: *env-common
      INGEST_PORT: "8007"
      RAG_SERVER_URL: http://host.docker.internal:8081
      INGEST_STAGING_DIR: /tmp/ingest-staging
    ports:
      - "8007:8007"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ingest-docker.rule=PathPrefix(`/v1/ingest`)"
      - "traefik.http.routers.ingest-docker.entrypoints=web"
      - "traefik.http.routers.ingest-docker.priority=100"
      - "traefik.http.services.ingest-docker.loadbalancer.server.port=8007"

  astro:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/astro/Dockerfile
    environment:
      <<: *env-common
      ASTRO_PORT: "8011"
      EPHE_PATH: "/ephe"
      REDIS_URL: redis:6379
      SGLANG_LLM_URL: ${SGLANG_LLM_URL:-}
      SGLANG_LLM_MODEL: ${SGLANG_LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8011:8011"
    volumes:
      - astro_ephe:/ephe:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astro-docker.rule=PathPrefix(`/v1/astro`)"
      - "traefik.http.routers.astro-docker.entrypoints=web"
      - "traefik.http.routers.astro-docker.priority=100"
      - "traefik.http.services.astro-docker.loadbalancer.server.port=8011"

  search:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/search/Dockerfile
    environment:
      <<: *env-common
      SEARCH_PORT: "8010"
      SEARCH_GRPC_PORT: "50051"
      REDIS_URL: redis:6379
      SGLANG_LLM_URL: ${SGLANG_LLM_URL:-}
      SGLANG_LLM_MODEL: ${SGLANG_LLM_MODEL:-}
    ports:
      - "8010:8010"
    expose:
      - "50051"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.search-docker.rule=PathPrefix(`/v1/search`)"
      - "traefik.http.routers.search-docker.entrypoints=web"
      - "traefik.http.routers.search-docker.priority=100"
      - "traefik.http.services.search-docker.loadbalancer.server.port=8010"

  traces:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/traces/Dockerfile
    environment:
      <<: *env-common
      TRACES_PORT: "8009"
      POSTGRES_PLATFORM_URL: postgres://sda:sda_dev@postgres:5432/sda_platform?sslmode=disable
      REDIS_URL: redis:6379
    ports:
      - "8009:8009"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traces-docker.rule=PathPrefix(`/v1/traces`)"
      - "traefik.http.routers.traces-docker.entrypoints=web"
      - "traefik.http.routers.traces-docker.priority=100"
      - "traefik.http.services.traces-docker.loadbalancer.server.port=8009"

  feedback:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/feedback/Dockerfile
    environment:
      <<: *env-common
      FEEDBACK_PORT: "8008"
      POSTGRES_PLATFORM_URL: postgres://sda:sda_dev@postgres:5432/sda_platform?sslmode=disable
      REDIS_URL: redis:6379
    ports:
      - "8008:8008"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.feedback-docker.rule=PathPrefix(`/v1/feedback`)"
      - "traefik.http.routers.feedback-docker.entrypoints=web"
      - "traefik.http.routers.feedback-docker.priority=100"
      - "traefik.http.services.feedback-docker.loadbalancer.server.port=8008"

  healthwatch:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/healthwatch/Dockerfile
    environment:
      <<: *env-common
      HEALTHWATCH_PORT: "8014"
      POSTGRES_PLATFORM_URL: postgres://sda:sda_dev@postgres:5432/sda_platform?sslmode=disable
      PROMETHEUS_URL: http://host.docker.internal:9090
      DOCKER_PROXY_URL: http://host.docker.internal:2375
    ports:
      - "8014:8014"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.healthwatch-docker.rule=PathPrefix(`/v1/healthwatch`)"
      - "traefik.http.routers.healthwatch-docker.entrypoints=web"
      - "traefik.http.routers.healthwatch-docker.priority=100"
      - "traefik.http.services.healthwatch-docker.loadbalancer.server.port=8014"

  bigbrother:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/bigbrother/Dockerfile
    environment:
      <<: *env-common
      BIGBROTHER_PORT: "8012"
      SCAN_MODE: passive
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
      EVENT_RETENTION_DAYS: "90"
      REDIS_URL: redis:6379
    ports:
      - "8012:8012"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bigbrother-docker.rule=PathPrefix(`/v1/bigbrother`)"
      - "traefik.http.routers.bigbrother-docker.entrypoints=web"
      - "traefik.http.routers.bigbrother-docker.priority=100"
      - "traefik.http.services.bigbrother-docker.loadbalancer.server.port=8012"

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  model_cache:
  astro_ephe:
