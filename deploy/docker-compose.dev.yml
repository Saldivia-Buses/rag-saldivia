# SDA Framework — Development Stack
#
# Two modes:
#   make dev       → infra only (postgres, redis, nats, traefik, mailpit)
#                    run Go services on host: go run ./services/auth/cmd/...
#                    traefik routes via deploy/traefik/dynamic/dev.yml → host.docker.internal
#
#   make dev-full  → infra + all Go services in Docker
#                    traefik auto-discovers containers via Docker labels (priority 100)
#                    file-based dev.yml routes (priority 1) serve as fallback

x-service-defaults: &service-defaults
  build:
    context: ..
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    nats:
      condition: service_healthy

x-env-common: &env-common
  SDA_ENV: development
  NATS_URL: nats://nats:4222
  REDIS_URL: redis:6379
  # DEV ONLY — production uses Docker secrets (deploy/secrets/).
  # Ed25519 keys (base64-encoded PEM) — generated by deploy/scripts/gen-jwt-keys.sh
  JWT_PRIVATE_KEY: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1DNENBUUF3QlFZREsyVndCQ0lFSUZvSXFxYU1BcjVjYnZFSE9Rc2g0cnVQTUUzeCtRSkVlVDByNnkxQ2tjMmgKLS0tLS1FTkQgUFJJVkFURSBLRVktLS0tLQo=
  JWT_PUBLIC_KEY: LS0tLS1CRUdJTiBQVUJMSUMgS0VZLS0tLS0KTUNvd0JRWURLMlZ3QXlFQVpMSmkrZmtPbitKUllNQmc4VkVBTkh2bXRzZUxQK3JmRFdFUStZL3ZIU0E9Ci0tLS0tRU5EIFBVQkxJQyBLRVktLS0tLQo=
  POSTGRES_TENANT_URL: postgres://sda:sda_dev@postgres:5432/sda_tenant_dev?sslmode=disable
  # MinIO storage — Docker-internal hostname. When running Go on host
  # (make dev), override: STORAGE_ENDPOINT=http://localhost:9000
  STORAGE_ENDPOINT: http://minio:9000
  STORAGE_BUCKET: sda-documents
  STORAGE_ACCESS_KEY: sda-admin
  STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-sda-dev-secret}
  # OpenTelemetry — requires observability stack running (deploy/observability/).
  # If otel-collector is not reachable, tracing degrades gracefully (disabled).
  # For host dev: OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4317
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-localhost:4317}

services:

  # ── Infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sda
      POSTGRES_PASSWORD: sda_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sda"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["--js", "--sd", "/data", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"   # localhost only — not exposed to network
      - "127.0.0.1:8222:8222"   # monitoring, localhost only
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  traefik:
    image: traefik:v3
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    extra_hosts:
      # In WSL2, host-gateway may not resolve to the WSL IP.
      # Override with the actual WSL IP: ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}'
      # Or set SDA_HOST_IP env var before running docker compose.
      - "host.docker.internal:${SDA_HOST_IP:-host-gateway}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: sda-admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sda-dev-secret}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── SGLang Model Servers (profile: gpu) ─────────────────────────────
  # Only start with: docker compose --profile gpu up
  # Requires NVIDIA GPU with Container Toolkit installed.
  # Each instance serves exactly one model on its own port.

  sglang-ocr:
    image: lmsysorg/sglang:latest-nvidia-gpu
    profiles: [gpu]
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model
      - PaddlePaddle/PaddleOCR-VL-1.5
      - --port
      - "8000"
      - --host
      - "0.0.0.0"
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=${SDA_GPU_DEVICES:-0}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  sglang-vision:
    image: lmsysorg/sglang:latest-nvidia-gpu
    profiles: [gpu]
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model
      - Qwen/Qwen3.5-9B
      - --port
      - "8000"
      - --host
      - "0.0.0.0"
    ports:
      - "127.0.0.1:8101:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=${SDA_GPU_DEVICES:-0}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── Database Init ──────────────────────────────────────────────────────
  # Migrations run via workflow step (docker exec into postgres).
  # See .github/workflows/deploy.yml "Run migrations" step.
  # For local dev: make migrate

  # ── Frontend ──────────────────────────────────────────────────────────
  # Always on. Production-mode Next.js standalone served behind Traefik so
  # remote access via VPN/IP works (dev mode fails to hydrate over remote IP).
  # For interactive HMR development, use `make dev-frontend` on your laptop
  # against localhost — this container is for the workstation/test env.

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
    environment:
      # Next.js standalone defaults to binding the container hostname only,
      # which makes localhost-based healthchecks fail. Force all interfaces.
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped
    # Direct port for debugging — keep until Traefik routing is verified.
    ports:
      - "3000:3000"
    # Healthcheck uses node (always available in node:22-alpine) — wget/curl are not.
    # Traefik silently filters out containers with status=unhealthy, so a broken
    # healthcheck breaks routing even though the app is fine.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=deploy_default"
      # Catch-all: lowest priority so /v1/* and /ws/* match first.
      # Router name `frontend` (not `web-docker`) — `web` is also the entrypoint name
      # which Traefik may conflate when normalizing label keys.
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ── Go Services (profile: full) ──────────────────────────────────────
  # Only start with: docker compose --profile full up --build
  # Traefik auto-discovers these via Docker labels (priority 100).
  # Note: auth + platform + feedback folded into `app` per ADR 025 core;
  # bigbrother + healthwatch + traces per ops pilot; ingest + search +
  # agent per rag fusion; chat + ws + notification per realtime fusion.
  # Only erp is still a standalone here — the monolith's own routing
  # into docker-compose lands in a separate commit.

  erp:
    <<: *service-defaults
    profiles: [full]
    build:
      context: ..
      dockerfile: services/erp/Dockerfile
    environment:
      <<: *env-common
      ERP_PORT: "8013"
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
      REDIS_URL: redis:6379
    ports:
      - "8013:8013"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erp-docker.rule=PathPrefix(`/v1/erp`)"
      - "traefik.http.routers.erp-docker.entrypoints=web"
      - "traefik.http.routers.erp-docker.middlewares=dev-cors@file"
      - "traefik.http.routers.erp-docker.priority=100"
      - "traefik.http.services.erp-docker.loadbalancer.server.port=8013"

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  model_cache:
