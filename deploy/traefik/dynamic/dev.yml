# Traefik dynamic config for local development.
# Routes API paths to Go services running on the host (go run ./cmd/...).
#
# Services run on the host machine, Traefik runs in Docker.
# 172.28.241.36 resolves to the host from inside Docker.
#
# In dev, tenant slug is injected via middleware header.
# In production, Traefik extracts it from the subdomain.
#
# Ports (HTTP):
#   auth:8001  ws:8002  chat:8003  agent:8004
#   notification:8005  platform:8006  ingest:8007
#   feedback:8008  traces:8009  search:8010
# Ports (gRPC, internal only):
#   search:50051

http:
  routers:
    # Auth — login, token refresh, modules
    # Needs dev-tenant in multi-tenant mode so X-Tenant-Slug is available for login
    auth:
      rule: "PathPrefix(`/v1/auth`) || PathPrefix(`/v1/modules`)"
      service: auth
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # WebSocket — real-time channel
    ws:
      rule: "PathPrefix(`/ws`)"
      service: ws
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Chat — sessions + messages
    chat:
      rule: "PathPrefix(`/v1/chat`)"
      service: chat
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Agent — LLM runtime + tool execution
    agent:
      rule: "PathPrefix(`/v1/agent`)"
      service: agent
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Search — tree-based document retrieval
    search:
      rule: "PathPrefix(`/v1/search`)"
      service: search
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Traces — execution traces + cost tracking
    traces:
      rule: "PathPrefix(`/v1/traces`)"
      service: traces
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Feedback — quality metrics + alerts
    feedback:
      rule: "PathPrefix(`/v1/feedback`) || PathPrefix(`/v1/platform/feedback`)"
      service: feedback
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Notifications — in-app + preferences
    notifications:
      rule: "PathPrefix(`/v1/notifications`)"
      service: notification
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Platform — admin-only tenant/module/config management
    platform:
      rule: "PathPrefix(`/v1/platform`)"
      service: platform
      entryPoints: [web]
      middlewares: [dev-cors]

    # Feature flags evaluate — any authenticated user
    flags:
      rule: "PathPrefix(`/v1/flags`)"
      service: platform
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Ingest — document upload + job tracking
    ingest:
      rule: "PathPrefix(`/v1/ingest`)"
      service: ingest
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # ERP — legacy Histrix replacement modules
    erp:
      rule: "PathPrefix(`/v1/erp`)"
      service: erp
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # HealthWatch — platform-level health monitoring (no dev-tenant: admin only)
    healthwatch:
      rule: "PathPrefix(`/v1/healthwatch`)"
      service: healthwatch
      entryPoints: [web]
      middlewares: [dev-cors]

  services:
    auth:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8001"
    ws:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8002"
    chat:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8003"
    agent:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8004"
    search:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8010"
    traces:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8009"
    feedback:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8008"
    notification:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8005"
    platform:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8006"
    ingest:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8007"
    erp:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8013"
    healthwatch:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8014"

  middlewares:
    # CORS for dev — frontend on :3000, API on :80
    dev-cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - X-Tenant-Slug
          - X-Tenant-ID
        accessControlAllowOriginListRegex:
          - "https?://.*:3000"
          - "https?://.*:3001"
        accessControlAllowCredentials: true
        accessControlMaxAge: 3600

    # In dev, inject tenant headers for all tenant-scoped routes.
    # In production, Traefik extracts these from the subdomain.
    dev-tenant:
      headers:
        customRequestHeaders:
          X-Tenant-ID: "dev-tenant-id"
          X-Tenant-Slug: "dev"
