# Traefik dynamic config for local development.
# Routes API paths to Go services running on the host (go run ...).
#
# Services run on the host machine, Traefik runs in Docker.
# host.docker.internal resolves to the host from inside Docker.
#
# In dev, tenant slug is injected via middleware header.
# In production, Traefik extracts it from the subdomain.
#
# Post ADR 025: the `app` monolith owns every /v1/* path except
# /v1/erp (erp is still a standalone). The 10 per-service routers
# that used to live here collapsed into per-prefix aliases all
# pointing at `service: app` — kept per-prefix so the middleware
# attachment mirrors the old per-service CORS/tenant decisions.
# Ports (HTTP):
#   app:8020  erp:8013
#   extractor:8090 (Python — not routed through Traefik here)

http:
  routers:
    # Auth — login, token refresh, modules (app module)
    # Needs dev-tenant in multi-tenant mode so X-Tenant-Slug is available for login
    auth:
      rule: "PathPrefix(`/v1/auth`) || PathPrefix(`/v1/modules`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # WebSocket — real-time channel (app ws module)
    ws:
      rule: "PathPrefix(`/ws`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Chat — sessions + messages (app chat module)
    chat:
      rule: "PathPrefix(`/v1/chat`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Agent — LLM runtime + tool execution (app agent module)
    agent:
      rule: "PathPrefix(`/v1/agent`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Search — tree-based document retrieval (app search module)
    search:
      rule: "PathPrefix(`/v1/search`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Traces — execution traces + cost tracking (app traces module)
    traces:
      rule: "PathPrefix(`/v1/traces`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Feedback — quality metrics + alerts (app feedback module)
    feedback:
      rule: "PathPrefix(`/v1/feedback`) || PathPrefix(`/v1/platform/feedback`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Notifications — in-app + preferences (app notification module)
    notifications:
      rule: "PathPrefix(`/v1/notifications`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Platform — admin-only tenant/module/config management (app platform module)
    platform:
      rule: "PathPrefix(`/v1/platform`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors]

    # Feature flags evaluate — any authenticated user
    flags:
      rule: "PathPrefix(`/v1/flags`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # Ingest — document upload + job tracking (app ingest module)
    ingest:
      rule: "PathPrefix(`/v1/ingest`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # ERP — legacy Histrix replacement modules (still standalone)
    erp:
      rule: "PathPrefix(`/v1/erp`)"
      service: erp
      entryPoints: [web]
      middlewares: [dev-cors, dev-tenant]

    # HealthWatch — platform-level health monitoring (app healthwatch module; admin only)
    healthwatch:
      rule: "PathPrefix(`/v1/healthwatch`)"
      service: app
      entryPoints: [web]
      middlewares: [dev-cors]

  services:
    app:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8020"
    erp:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8013"

  middlewares:
    # CORS for dev — frontend on :3000, API on :80
    dev-cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - X-Tenant-Slug
          - X-Tenant-ID
        accessControlAllowOriginListRegex:
          - "https?://.*:3000"
          - "https?://.*:3001"
        accessControlAllowCredentials: true
        accessControlMaxAge: 3600

    # In dev, inject tenant headers for all tenant-scoped routes.
    # In production, Traefik extracts these from the subdomain.
    dev-tenant:
      headers:
        customRequestHeaders:
          X-Tenant-ID: "dev-tenant-id"
          X-Tenant-Slug: "dev"
