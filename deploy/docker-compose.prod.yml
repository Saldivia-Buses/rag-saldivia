# SDA Framework — Production Stack
#
# Deploy: docker compose -f deploy/docker-compose.prod.yml up -d
# Prerequisites: deploy/secrets/ populated with keys + credentials
#
# Differences from dev:
# - No exposed ports (only Traefik 80/443)
# - Docker secrets for credentials
# - Resource limits per service
# - Redis with password, NATS with auth token
# - Traefik with HTTPS + dashboard disabled
# - Network segmentation (frontend/backend/data)

secrets:
  jwt_private_key:
    file: ./secrets/jwt-private.pem
  jwt_public_key:
    file: ./secrets/jwt-public.pem
  db_platform_url:
    file: ./secrets/db-platform-url
  db_tenant_template_url:
    file: ./secrets/db-tenant-template-url
  redis_password:
    file: ./secrets/redis-password
  encryption_master_key:
    file: ./secrets/encryption-master-key
  db_platform_password:
    file: ./secrets/db-platform-password
  bb_kek:
    file: ./secrets/bb-kek

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-jwt-public: &jwt-public
  JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key

x-redis: &redis-url
  REDIS_URL: "redis:6379"

services:

  # ── Docker Socket Proxy (L14) ──────────────────────────────────────────
  # Traefik talks to Docker via this proxy instead of the raw socket.
  # Limits API surface: only container listing (no exec, no networks).

  docker-socket-proxy:
    <<: *service-defaults
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      NETWORKS: 0
      SERVICES: 0
      TASKS: 0
      INFO: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # ── Gateway ────────────────────────────────────────────────────────────

  traefik:
    <<: *service-defaults
    image: traefik:v3
    depends_on:
      - docker-socket-proxy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://docker-socket-proxy:2375"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--api.dashboard=false"
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.bufferingsize=100"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/traefik.prod.yml:/etc/traefik/traefik.yml:ro
      - traefik_logs:/var/log/traefik
      - traefik_acme:/etc/traefik/acme
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  # ── CrowdSec IDS (M12) ───────────────────────────────────────────────

  crowdsec:
    <<: *service-defaults
    image: crowdsecurity/crowdsec:latest
    environment:
      COLLECTIONS: "crowdsecurity/traefik crowdsecurity/http-cve"
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - traefik_logs:/var/log/traefik:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Data ───────────────────────────────────────────────────────────────

  postgres-platform:
    <<: *service-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sda
      POSTGRES_PASSWORD_FILE: /run/secrets/db_platform_password
    secrets:
      - db_platform_password
    volumes:
      - postgres_platform_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sda"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: >
      sh -c "redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass $$(cat /run/secrets/redis_password)"
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"

  nats:
    <<: *service-defaults
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats-server.conf", "-m", "8222"]
    environment:
      AUTH_NATS_PASS: ${AUTH_NATS_PASS}
      CHAT_NATS_PASS: ${CHAT_NATS_PASS}
      WS_NATS_PASS: ${WS_NATS_PASS}
      NOTIF_NATS_PASS: ${NOTIF_NATS_PASS}
      INGEST_NATS_PASS: ${INGEST_NATS_PASS}
      FEEDBACK_NATS_PASS: ${FEEDBACK_NATS_PASS}
      AGENT_NATS_PASS: ${AGENT_NATS_PASS}
      TRACES_NATS_PASS: ${TRACES_NATS_PASS}
      PLATFORM_NATS_PASS: ${PLATFORM_NATS_PASS}
      EXTRACTOR_NATS_PASS: ${EXTRACTOR_NATS_PASS}
      ASTRO_NATS_PASS: ${ASTRO_NATS_PASS}
      BIGBROTHER_NATS_PASS: ${BIGBROTHER_NATS_PASS}
      ERP_NATS_PASS: ${ERP_NATS_PASS}
    volumes:
      - nats_data:/data
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  # ── Go Services ────────────────────────────────────────────────────────

  auth:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-auth:${AUTH_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTH_PORT: "8001"
      REDIS_URL: redis:6379
      NATS_URL: nats://auth:${AUTH_NATS_PASS}@nats:4222
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
    secrets:
      - jwt_private_key
      - jwt_public_key
      - db_platform_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/v1/auth`) || PathPrefix(`/v1/modules`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  ws:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-ws:${WS_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/ws/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      WS_PORT: "8002"
      REDIS_URL: redis:6379
      NATS_URL: nats://ws:${WS_NATS_PASS}@nats:4222
      WS_ALLOWED_ORIGINS: "https://*.${SDA_DOMAIN:-sda.app}"
      CHAT_GRPC_URL: chat:50052
    secrets:
      - jwt_public_key
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.ws.entrypoints=websecure"
      - "traefik.http.services.ws.loadbalancer.server.port=8002"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  chat:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-chat:${CHAT_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/chat/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      CHAT_PORT: "8003"
      CHAT_GRPC_PORT: "50052"
      REDIS_URL: redis:6379
      NATS_URL: nats://chat:${CHAT_NATS_PASS}@nats:4222
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
    secrets:
      - jwt_public_key
      - db_tenant_template_url
    expose:
      - "50052"  # gRPC — internal only for ws mutations
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat.rule=PathPrefix(`/v1/chat`)"
      - "traefik.http.routers.chat.entrypoints=websecure"
      - "traefik.http.services.chat.loadbalancer.server.port=8003"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  agent:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-agent:${AGENT_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/agent/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      AGENT_PORT: "8004"
      REDIS_URL: redis:6379
      NATS_URL: nats://agent:${AGENT_NATS_PASS}@nats:4222
      SGLANG_LLM_URL: ${SGLANG_LLM_URL:-http://host.docker.internal:8102}
      SGLANG_LLM_MODEL: ${SGLANG_LLM_MODEL:-}
      SEARCH_SERVICE_URL: http://search:8010
      SEARCH_GRPC_URL: search:50051
      INGEST_SERVICE_URL: http://ingest:8007
      NOTIFICATION_SERVICE_URL: http://notification:8005
      ASTRO_SERVICE_URL: http://astro:8011
      LLM_API_KEY: ${LLM_API_KEY:-}
      MODULES_DIR: /modules
      <<: *jwt-public
    secrets:
      - jwt_public_key
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=PathPrefix(`/v1/agent`)"
      - "traefik.http.routers.agent.entrypoints=websecure"
      - "traefik.http.services.agent.loadbalancer.server.port=8004"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 128M

  search:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-search:${SEARCH_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/search/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
    environment:
      SEARCH_PORT: "8010"
      REDIS_URL: redis:6379
      SEARCH_GRPC_PORT: "50051"
      SGLANG_LLM_URL: ${SGLANG_LLM_URL:-http://host.docker.internal:8102}
      SGLANG_LLM_MODEL: ${SGLANG_LLM_MODEL:-}
      <<: *jwt-public
    secrets:
      - jwt_public_key
      - db_tenant_template_url
    expose:
      - "50051"  # gRPC — internal only, not routed by Traefik
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend  # needed for agent→search gRPC
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.search.rule=PathPrefix(`/v1/search`)"
      - "traefik.http.routers.search.entrypoints=websecure"
      - "traefik.http.services.search.loadbalancer.server.port=8010"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  traces:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-traces:${TRACES_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/traces/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      TRACES_PORT: "8009"
      REDIS_URL: redis:6379
      NATS_URL: nats://traces:${TRACES_NATS_PASS}@nats:4222
      <<: *jwt-public
    secrets:
      - jwt_public_key
      - db_platform_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8009/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traces.rule=PathPrefix(`/v1/traces`)"
      - "traefik.http.routers.traces.entrypoints=websecure"
      - "traefik.http.services.traces.loadbalancer.server.port=8009"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  notification:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-notification:${NOTIFICATION_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/notification/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      NOTIFICATION_PORT: "8005"
      REDIS_URL: redis:6379
      NATS_URL: nats://notification:${NOTIF_NATS_PASS}@nats:4222
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@${SDA_DOMAIN:-sda.app}}
    secrets:
      - jwt_public_key
      - db_tenant_template_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification.rule=PathPrefix(`/v1/notifications`)"
      - "traefik.http.routers.notification.entrypoints=websecure"
      - "traefik.http.services.notification.loadbalancer.server.port=8005"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  platform:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-platform:${PLATFORM_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/platform/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
    environment:
      PLATFORM_PORT: "8006"
      REDIS_URL: redis:6379
      PLATFORM_TENANT_SLUG: platform
      NATS_URL: nats://platform:${PLATFORM_NATS_PASS}@nats:4222
      <<: *jwt-public
    secrets:
      - jwt_public_key
      - db_platform_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform.rule=Host(`platform.${SDA_DOMAIN:-sda.app}`) && PathPrefix(`/v1/platform`)"
      - "traefik.http.routers.platform.entrypoints=websecure"
      - "traefik.http.services.platform.loadbalancer.server.port=8006"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  ingest:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-ingest:${INGEST_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/ingest/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      INGEST_PORT: "8007"
      REDIS_URL: redis:6379
      NATS_URL: nats://ingest:${INGEST_NATS_PASS}@nats:4222
      RAG_SERVER_URL: ${RAG_SERVER_URL:-http://host.docker.internal:8081}
      INGEST_STAGING_DIR: /tmp/ingest-staging
    secrets:
      - jwt_public_key
      - db_tenant_template_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8007/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ingest.rule=PathPrefix(`/v1/ingest`)"
      - "traefik.http.routers.ingest.entrypoints=websecure"
      - "traefik.http.services.ingest.loadbalancer.server.port=8007"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  feedback:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-feedback:${FEEDBACK_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/feedback/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      FEEDBACK_PORT: "8008"
      REDIS_URL: redis:6379
      NATS_URL: nats://feedback:${FEEDBACK_NATS_PASS}@nats:4222
    secrets:
      - jwt_public_key
      - db_platform_url
      - db_tenant_template_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.feedback.rule=PathPrefix(`/v1/feedback`) || PathPrefix(`/v1/platform/feedback`)"
      - "traefik.http.routers.feedback.entrypoints=websecure"
      - "traefik.http.services.feedback.loadbalancer.server.port=8008"
      - "traefik.docker.network=frontend"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  # ── Astro (Plan 13 — astrological intelligence engine, CGO) ────────
  astro:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-astro:${ASTRO_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/astro/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ASTRO_PORT: "8011"
      REDIS_URL: redis:6379
      NATS_URL: nats://astro:${ASTRO_NATS_PASS:-astro}@nats:4222
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
      SGLANG_LLM_URL: ${SGLANG_LLM_URL:-http://host.docker.internal:8102}
      SGLANG_LLM_MODEL: ${SGLANG_LLM_MODEL:-}
      EPHE_PATH: /ephe
      LLM_API_KEY: ${LLM_API_KEY:-}
      <<: *jwt-public
    secrets:
      - jwt_public_key
      - db_tenant_template_url
    volumes:
      - ${EPHE_DATA_PATH:-./ephe}:/ephe:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8011/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astro.rule=PathPrefix(`/v1/astro`)"
      - "traefik.http.routers.astro.entrypoints=websecure"
      - "traefik.http.services.astro.loadbalancer.server.port=8011"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 128M

  # ── Extractor (Python OCR + Vision pipeline) ──────────────────────────

  extractor:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-extractor:${EXTRACTOR_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/extractor/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    environment:
      EXTRACTOR_PORT: "8090"
      NATS_URL: nats://extractor:${EXTRACTOR_NATS_PASS}@nats:4222
      SGLANG_OCR_URL: ${SGLANG_OCR_URL:-http://host.docker.internal:8100}
      SGLANG_VISION_URL: ${SGLANG_VISION_URL:-http://host.docker.internal:8101}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── ERP (legacy Histrix replacement — modular business modules) ──────

  erp:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-erp:${ERP_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/erp/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ERP_PORT: "8013"
      REDIS_URL: redis:6379
      NATS_URL: nats://erp:${ERP_NATS_PASS}@nats:4222
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
      <<: *jwt-public
    secrets:
      - jwt_public_key
      - db_tenant_template_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8013/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erp.rule=PathPrefix(`/v1/erp`)"
      - "traefik.http.routers.erp.entrypoints=websecure"
      - "traefik.http.services.erp.loadbalancer.server.port=8013"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  # ── BigBrother (Plan 15 — network intelligence, EXCEPTION: Alpine + CAP_NET_RAW) ──

  bigbrother:
    <<: *service-defaults
    image: ghcr.io/camionerou/sda-bigbrother:${BIGBROTHER_VERSION:-latest}
    build:
      context: ..
      dockerfile: services/bigbrother/Dockerfile
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    cap_drop: [ALL]
    cap_add: [NET_RAW]
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec,nosuid,nodev
    security_opt:
      - "seccomp:deploy/seccomp/bigbrother.json"
      - no-new-privileges:true
    environment:
      BIGBROTHER_PORT: "8012"
      REDIS_URL: redis:6379
      NATS_URL: nats://bigbrother:${BIGBROTHER_NATS_PASS}@nats:4222
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
      SCAN_MODE: "passive"
      EVENT_RETENTION_DAYS: "90"
      <<: *jwt-public
    secrets:
      - jwt_public_key
      - db_tenant_template_url
      - bb_kek
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
      - lan
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bigbrother.rule=PathPrefix(`/v1/bigbrother`)"
      - "traefik.http.routers.bigbrother.entrypoints=websecure"
      - "traefik.http.services.bigbrother.loadbalancer.server.port=8012"
      - "traefik.docker.network=frontend"
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ── Self-Healing ────────────────────────────────────────────────────
  # Autoheal monitors Docker health checks and restarts unhealthy containers.
  # Docker restart policies only restart EXITED containers, not UNHEALTHY ones.
  autoheal:
    image: willfarrell/autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30        # check every 30s
      AUTOHEAL_START_PERIOD: 60    # grace period on startup
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"

networks:
  frontend:    # traefik ↔ Go services
  backend:     # Go services ↔ NATS
  data:        # Go services ↔ PostgreSQL, Redis
  lan:         # macvlan for BigBrother physical LAN access
    driver: macvlan
    driver_opts:
      parent: ${LAN_INTERFACE:-eth0}
    ipam:
      config:
        - subnet: ${LAN_SUBNET:-192.168.1.0/24}

volumes:
  postgres_platform_data:
  redis_data:
  nats_data:
  traefik_logs:
  traefik_acme:
  crowdsec_data:
  crowdsec_config:
