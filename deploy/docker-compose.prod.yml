# SDA Framework — Production Stack
#
# Deploy: docker compose -f deploy/docker-compose.prod.yml up -d
# Prerequisites: deploy/secrets/ populated with keys + credentials
#
# Differences from dev:
# - No exposed ports (only Traefik 80/443)
# - Docker secrets for credentials
# - Resource limits per service
# - Redis with password, NATS with auth token
# - Traefik with HTTPS + dashboard disabled
# - Network segmentation (frontend/backend/data)

secrets:
  jwt_private_key:
    file: ./secrets/jwt-private.pem
  jwt_public_key:
    file: ./secrets/jwt-public.pem
  db_platform_url:
    file: ./secrets/db-platform-url
  db_tenant_template_url:
    file: ./secrets/db-tenant-template-url
  redis_password:
    file: ./secrets/redis-password
  encryption_master_key:
    file: ./secrets/encryption-master-key
  db_platform_password:
    file: ./secrets/db-platform-password
  bb_kek:
    file: ./secrets/bb-kek
  alertmanager_webhook_token:
    file: ./secrets/alertmanager-webhook-token
  service_account_key:
    file: ./secrets/service-account-key

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-jwt-public: &jwt-public
  JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key

x-redis: &redis-url
  REDIS_URL: "redis:6379"

x-build-args: &build-args
  GIT_SHA: ${GIT_SHA:-unknown}
  BUILD_TIME: ${BUILD_TIME:-unknown}

services:

  # ── Docker Socket Proxy (L14) ──────────────────────────────────────────
  # Traefik talks to Docker via this proxy instead of the raw socket.
  # Limits API surface: only container listing (no exec, no networks).

  docker-socket-proxy:
    <<: *service-defaults
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      CONTAINERS: 1
      POST: 1          # needed for autoheal restart calls
      NETWORKS: 0
      SERVICES: 0
      TASKS: 0
      INFO: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # ── Gateway ────────────────────────────────────────────────────────────

  traefik:
    <<: *service-defaults
    image: traefik:v3
    depends_on:
      - docker-socket-proxy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://docker-socket-proxy:2375"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      # HTTP→HTTPS redirect disabled: VPN/IP access uses plain HTTP same-origin.
      # Re-enable once TLS is provisioned (Tailscale Funnel, ACME, or Cloudflare).
      - "--entrypoints.websecure.address=:443"
      - "--api.dashboard=false"
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.bufferingsize=100"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/traefik.prod.yml:/etc/traefik/traefik.yml:ro
      - traefik_logs:/var/log/traefik
      - traefik_acme:/etc/traefik/acme
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  # ── Frontend (Next.js standalone) ────────────────────────────────────
  # Production build, served by node from .next/standalone.
  # Same-origin with API: Traefik routes /v1/* and /ws/* to backend services
  # and `/` (lowest priority) to this container. NEXT_PUBLIC_API_URL="" so the
  # browser uses relative URLs against the same host that served the page.

  web:
    <<: *service-defaults
    image: ghcr.io/saldivia-buses/sda-web:${WEB_VERSION:-local}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "autoheal=true"
      # Catch-all router at lowest priority so /v1/* and /ws/* match first.
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.routers.web.entrypoints=web,websecure"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ── CrowdSec IDS (M12) ───────────────────────────────────────────────

  crowdsec:
    <<: *service-defaults
    image: crowdsecurity/crowdsec:latest
    environment:
      COLLECTIONS: "crowdsecurity/traefik crowdsecurity/http-cve"
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - traefik_logs:/var/log/traefik:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Data ───────────────────────────────────────────────────────────────

  postgres-platform:
    <<: *service-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sda
      POSTGRES_PASSWORD_FILE: /run/secrets/db_platform_password
    secrets:
      - db_platform_password
    volumes:
      - postgres_platform_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sda"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: >
      sh -c "redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass $$(cat /run/secrets/redis_password)"
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"

  nats:
    <<: *service-defaults
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats-server.conf", "-m", "8222"]
    # Post ADR 025: nats-server.conf only defines three users — app (monolith),
    # erp, extractor. The per-module envs (AUTH_, CHAT_, WS_, …) were dropped
    # when the fusion landed.
    environment:
      APP_NATS_PASS: ${APP_NATS_PASS}
      ERP_NATS_PASS: ${ERP_NATS_PASS}
      EXTRACTOR_NATS_PASS: ${EXTRACTOR_NATS_PASS}
    volumes:
      - nats_data:/data
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  # ── Go Services ────────────────────────────────────────────────────────
  # Post ADR 025: auth + platform + feedback + bigbrother + healthwatch +
  # traces + ingest + search + agent + chat + ws + notification all live
  # in the `app` monolith (services/app/cmd). `erp` is the only remaining
  # standalone Go service; `extractor` is the Python sidecar.

  # ── App monolith ──────────────────────────────────────────────────────

  app:
    <<: *service-defaults
    image: ghcr.io/saldivia-buses/sda-app:${APP_VERSION:-local}
    build:
      context: ..
      dockerfile: services/app/Dockerfile
      args:
        <<: *build-args
        VERSION: ${APP_VERSION:-dev}
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      APP_PORT: "8020"
      TENANT_ID: ${SDA_TENANT_SLUG:-dev}
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
      # Redis password is on the server but the Go monolith's REDIS_URL
      # today is host:port only — redis client auth plumbing is a separate
      # follow-up (same gap erp has). Dev redis has no password so parity is OK.
      REDIS_URL: redis:6379
      NATS_URL: nats://app:${APP_NATS_PASS}@nats:4222
      # JWT keys read from raw PEM secret files via the _FILE fallback added
      # to pkg/jwt.MustLoadPublicKey/MustLoadPrivateKey in this commit.
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      # Platform pool: main.go reads `POSTGRES_PLATFORM_URL` and falls back
      # to the `/run/secrets/db_platform_url` file via loadSecret().
      # Tenant pool: per-silo URL, must be provided by the operator's .env.
      POSTGRES_TENANT_URL: ${POSTGRES_TENANT_URL}
      # Bigbrother KEK + service-account key + alert webhook: loadSecret()
      # checks the default paths below and falls back to env; nothing to set
      # here unless overriding.
      # Module enablement (CSV list, e.g. "bigbrother,fleet,erp").
      ENABLED_MODULES: ${ENABLED_MODULES:-}
      # URLs for cross-service tool dispatch.
      ERP_SERVICE_URL: http://erp:8013
    secrets:
      - jwt_public_key
      - jwt_private_key
      - db_platform_url
      - bb_kek
      - service_account_key
      - alertmanager_webhook_token
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8020/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
      - lan
    labels:
      - "traefik.enable=true"
      - "autoheal=true"
      # Same routing strategy as dev: priority 50 so erp's /v1/erp (100) wins first.
      - "traefik.http.routers.app.rule=PathPrefix(`/v1`) || PathPrefix(`/ws`) || PathPrefix(`/internal`)"
      - "traefik.http.routers.app.entrypoints=web,websecure"
      - "traefik.http.routers.app.priority=50"
      - "traefik.http.services.app.loadbalancer.server.port=8020"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  # ── Extractor (Python OCR + Vision pipeline) ──────────────────────────

  extractor:
    <<: *service-defaults
    image: ghcr.io/saldivia-buses/sda-extractor:${EXTRACTOR_VERSION:-local}
    build:
      context: ..
      dockerfile: services/extractor/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
    environment:
      EXTRACTOR_PORT: "8090"
      NATS_URL: nats://extractor:${EXTRACTOR_NATS_PASS}@nats:4222
      SGLANG_OCR_URL: ${SGLANG_OCR_URL:-http://host.docker.internal:8100}
      SGLANG_VISION_URL: ${SGLANG_VISION_URL:-http://host.docker.internal:8101}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── ERP (legacy Histrix replacement — modular business modules) ──────

  erp:
    <<: *service-defaults
    image: ghcr.io/saldivia-buses/sda-erp:${ERP_VERSION:-local}
    build:
      context: ..
      dockerfile: services/erp/Dockerfile
      args:
        <<: *build-args
        VERSION: ${ERP_VERSION:-dev}
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ERP_PORT: "8013"
      REDIS_URL: redis:6379
      NATS_URL: nats://erp:${ERP_NATS_PASS}@nats:4222
      TENANT_SLUG: ${SDA_TENANT_SLUG:-dev}
      <<: *jwt-public
    secrets:
      - jwt_public_key
      - db_tenant_template_url
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8013/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
      - backend
      - data
    labels:
      - "traefik.enable=true"
      - "autoheal=true"
      - "traefik.http.routers.erp.rule=PathPrefix(`/v1/erp`)"
      - "traefik.http.routers.erp.entrypoints=web,websecure"
      # Explicit priority higher than app.priority=50 so /v1/erp always hits erp
      # (with app's rule being a disjunction, traefik's default rule-length
      # tiebreaker isn't reliable).
      - "traefik.http.routers.erp.priority=100"
      - "traefik.http.services.erp.loadbalancer.server.port=8013"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"

  # ── Self-Healing ────────────────────────────────────────────────────
  # Autoheal monitors Docker health checks and restarts unhealthy containers.
  # Docker restart policies only restart EXITED containers, not UNHEALTHY ones.
  autoheal:
    image: willfarrell/autoheal
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30        # check every 30s
      AUTOHEAL_START_PERIOD: 60    # grace period on startup
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - frontend  # same network as docker-socket-proxy
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"

networks:
  frontend:    # traefik ↔ Go services
  backend:     # Go services ↔ NATS (named for cross-compose alertmanager access)
    name: sda-backend
  data:        # Go services ↔ PostgreSQL, Redis
  lan:         # macvlan for BigBrother physical LAN access
    driver: macvlan
    driver_opts:
      parent: ${LAN_INTERFACE:-eth0}
    ipam:
      config:
        - subnet: ${LAN_SUBNET:-192.168.1.0/24}

volumes:
  postgres_platform_data:
  redis_data:
  nats_data:
  traefik_logs:
  traefik_acme:
  crowdsec_data:
  crowdsec_config:
