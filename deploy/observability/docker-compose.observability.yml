# Observability stack — Grafana + Tempo + Prometheus + Loki + OTel Collector
# Usage: docker compose -f deploy/observability/docker-compose.observability.yml up -d

services:
  # ── OpenTelemetry Collector ─────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    container_name: sda-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    restart: unless-stopped
    networks:
      - sda-observability

  # ── Grafana Tempo (traces) ──────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.7.2
    container_name: sda-tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API
    restart: unless-stopped
    networks:
      - sda-observability

  # ── Prometheus (metrics) ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: sda-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - sda-observability

  # ── Grafana Loki (logs) ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.0
    container_name: sda-loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - sda-observability

  # ── Grafana (dashboards) ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: sda-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sda-grafana-dev
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - sda-observability

volumes:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  sda-observability:
    driver: bridge
