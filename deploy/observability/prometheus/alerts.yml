groups:
  - name: sda-service-health
    rules:
      # Service metric series disappeared (service crashed or stopped exporting)
      - alert: ServiceDown
        expr: |
          absent(up{job=~"sda-.*"}) == 1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "SDA service metrics absent — possible crash"
          description: "No metrics received from SDA services for 3 minutes. Check OTel collector and service health."

      # Error rate above 5% for 5 minutes
      - alert: HighErrorRate
        expr: |
          (
            sum by (service_name) (rate(http_server_request_duration_seconds_count{http_status_code=~"5.."}[5m]))
            /
            sum by (service_name) (rate(http_server_request_duration_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service_name }} error rate above 5%"
          description: "Service {{ $labels.service_name }} has {{ $value | humanizePercentage }} 5xx error rate."

      # P99 latency above 5 seconds
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket[5m]))
          ) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service_name }} P99 latency above 5s"
          description: "Service {{ $labels.service_name }} P99 latency is {{ $value | humanizeDuration }}."

      # Too many active requests (possible resource exhaustion)
      - alert: HighActiveRequests
        expr: |
          sum by (service_name) (http_server_active_requests) > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service_name }} has high active request count"
          description: "Service {{ $labels.service_name }} has {{ $value }} active requests."

  - name: sda-infrastructure
    rules:
      # Prometheus target is down (if scrape jobs are added later)
      - alert: TargetDown
        expr: up == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.instance }} is down"

      # Prometheus is running low on storage
      - alert: PrometheusStorageHigh
        expr: |
          (prometheus_tsdb_storage_blocks_bytes / (1024 * 1024 * 1024)) > 8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus storage above 8GB"
          description: "Current storage: {{ $value | printf \"%.1f\" }}GB"

  # Infrastructure alerts — require cAdvisor + node-exporter (add later).
  # Uncomment when these exporters are deployed:
  #
  # - name: sda-infrastructure-health
  #   rules:
  #     - alert: ContainerRestarted
  #       expr: increase(container_restart_count[10m]) > 2
  #       for: 1m
  #       labels: { severity: warning }
  #       annotations:
  #         summary: "Container {{ $labels.name }} restarted {{ $value }} times in 10m"
  #
  #     - alert: ContainerMemoryHigh
  #       expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
  #       for: 5m
  #       labels: { severity: warning }
  #       annotations:
  #         summary: "Container {{ $labels.name }} memory above 90%"
  #
  #     - alert: DiskSpaceLow
  #       expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
  #       for: 5m
  #       labels: { severity: critical }
  #       annotations:
  #         summary: "Disk space below 10%"

  # ── Spine Event Bus (Plan 26) ─────────────────────────────────────
  - name: sda-spine
    rules:
      - alert: SpineHandlerPanic
        expr: increase(spine_consume_total{result="panic"}[5m]) > 0
        labels:
          severity: critical
        annotations:
          summary: "Spine consumer {{ $labels.consumer }} panicked"
          description: "Consumer {{ $labels.consumer }} had a panic in the last 5 minutes. Check logs for stack trace."

      - alert: SpineDLQDepthHigh
        expr: spine_dlq_total > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ depth exceeded 100 events"
          description: "{{ $value }} events in DLQ. Check /admin/dlq for details and replay or drop."

      - alert: SpineConsumerErrorRate
        expr: |
          (
            sum by (consumer) (rate(spine_consume_total{result=~"error|handler_error|decode_error|panic"}[5m]))
            /
            sum by (consumer) (rate(spine_consume_total[5m]))
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Spine consumer {{ $labels.consumer }} error rate above 10%"
          description: "Consumer {{ $labels.consumer }} has {{ $value | humanizePercentage }} error rate over 10 minutes."

      - alert: SpineConsumerStalled
        expr: |
          rate(spine_consume_total{result="success"}[15m]) == 0
          and
          rate(spine_consume_total[15m]) > 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Spine consumer {{ $labels.consumer }} stalled — processing but no successes"
          description: "Consumer {{ $labels.consumer }} has been processing messages but none succeeded in 15 minutes."
