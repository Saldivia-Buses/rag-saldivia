global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# Alertmanager routing — fire alerts to alertmanager service
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Prometheus remote write receiver is enabled via --web.enable-remote-write-receiver
# OTel Collector sends metrics here
