# Alertmanager configuration for SDA Framework.
# Routes alerts from Prometheus to the notification service webhook.
#
# Auth: Bearer token from Docker secret (DS3).
# The webhook URL is Docker-internal (no Traefik routing).
# See: docs/plans/2.0.x-plan23-dev-stack-v2.md, Fase 2.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service_name']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → batched notification
    - match:
        severity: warning
      receiver: 'default'
      group_wait: 1m
      repeat_interval: 4h

receivers:
  # Default: webhook to notification service (warning/info alerts)
  - name: 'default'
    webhook_configs:
      - url: 'http://notification:8005/internal/webhook/alert'
        http_config:
          authorization:
            credentials_file: /run/secrets/alertmanager_webhook_token
        send_resolved: true

  # Critical: same webhook (handler sends email for critical severity)
  - name: 'critical'
    webhook_configs:
      - url: 'http://notification:8005/internal/webhook/alert'
        http_config:
          authorization:
            credentials_file: /run/secrets/alertmanager_webhook_token
        send_resolved: true

# Inhibition: if a critical alert fires, suppress warnings for same service
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service_name']
