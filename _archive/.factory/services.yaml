commands:
  install: cd services/sda-frontend && npm install
  typecheck: cd services/sda-frontend && npm run check
  build: cd services/sda-frontend && npm run build
  test: uv run pytest saldivia/tests/ -v
  lint: cd services/sda-frontend && npm run lint

services:
  gateway:
    start: uv run python -m uvicorn saldivia.gateway:app --host 0.0.0.0 --port 9000
    stop: lsof -ti :9000 | xargs kill -9
    healthcheck: curl -sf http://localhost:9000/health
    port: 9000
    depends_on: []

  frontend:
    start: cd services/sda-frontend && PORT=5173 npm run dev
    stop: lsof -ti :5173 | xargs kill -9
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: [gateway]
