---
# Flow: Login exitoso como admin
# Prerequisito: MOCK_RAG=true, app corriendo en BASE_URL
- openLink: ${BASE_URL}/login
- assertVisible: "RAG Saldivia"
- assertVisible: "Iniciá sesión para continuar"
- tapOn: "Email"
- inputText: ${ADMIN_EMAIL}
- tapOn: "Contraseña"
- inputText: ${ADMIN_PASSWORD}
- tapOn: "Iniciar sesión"
- assertVisible: "Chat"
- assertNotVisible: "Iniciá sesión para continuar"
